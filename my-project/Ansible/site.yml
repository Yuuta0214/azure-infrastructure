---
- name: Setup Web/App/DB Containers
  hosts: docker_hosts
  become: yes  # sudo権限で実行

  # 【追加】GitHub Actions 等から渡される変数のデフォルト値を定義
  vars:
    mysql_root_password: "{{ mysql_root_password | default('password123') }}"
    mysql_db_name: "{{ mysql_db_name | default('myapp_db') }}"

  tasks:
    # 1. ユーザーのホームディレクトリを取得
    # admin_username が変わっても動的にパスを特定します
    - name: Get remote user home directory
      shell: "getent passwd {{ ansible_user }} | cut -d: -f6"
      register: user_home
      changed_when: false

    # 2. アプリ用ディレクトリの作成
    - name: Create app directory
      file:
        path: "{{ user_home.stdout }}/app"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    # 3. Docker Composeファイルの配置（Jinja2テンプレート）
    # ここで mysql_root_password 等が注入されます
    - name: Deploy docker-compose.yml
      template:
        src: docker-compose.yml.j2
        dest: "{{ user_home.stdout }}/app/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    # 4. コンテナの起動
    # Debian 12 (Docker公式リポジトリ版) は 'docker compose' (v2) コマンドを使用します
    - name: Start containers with Docker Compose
      command:
        cmd: "docker compose up -d"
        chdir: "{{ user_home.stdout }}/app"
      register: compose_output
      changed_when: "'Started' in compose_output.stdout or 'Created' in compose_output.stdout or 'Running' in compose_output.stdout"

    # 5. 疎通確認
    - name: Check container status
      command:
        cmd: "docker compose ps"
        chdir: "{{ user_home.stdout }}/app"
      register: ps_output
      changed_when: false

    - name: Show container status
      debug:
        msg: "{{ ps_output.stdout_lines }}"