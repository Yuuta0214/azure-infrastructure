- name: "Deployment of Web Service (Nginx/App/DB)"
  hosts: all
  gather_facts: no

  vars:
    admin_user: "{{ admin_username }}"
    project_root: "/home/{{ admin_username }}/app"
    docker_gpg_path: "/etc/apt/keyrings/docker.gpg"

  tasks:
    # 昇格なしで実行（接続さえできれば通る）
    - name: "Wait for infrastructure bootstrap to complete"
      ansible.builtin.wait_for:
        path: /var/tmp/bootstrap_complete
        state: present
        timeout: 600
      become: no # ここではsudoしない

    - name: "Gather facts after bootstrap confirmation"
      ansible.builtin.setup:
      become: yes # ここから特権が必要

    # 以降、システム操作のタスクには become: yes を付与（またはブロック化）
    - name: "System Setup Task Example"
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      become: yes