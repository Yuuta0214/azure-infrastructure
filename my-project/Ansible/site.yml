---
- name: Full VM Provisioning and Container Deployment
  hosts: azure_vms
  become: yes
  gather_facts: no

  tasks:
    - name: Wait until bootstrap.sh is 100% finished
      wait_for:
        path: /var/tmp/bootstrap_complete
        state: present
        timeout: 600

    # --- 【最重要：必達】壊れたaptキャッシュを物理的に削除して再構築 ---
    - name: Clean broken apt cache and force update (IPv4)
      shell: |
        rm -rf /var/lib/apt/lists/*
        apt-get clean
        apt-get -o Acquire::ForceIPv4=true update -y
      register: apt_clean_res
      until: apt_clean_res is success
      retries: 5
      delay: 10

    - name: Gathering Facts
      setup:

    - name: Set timezone
      timezone:
        name: "Asia/Tokyo"

    - name: Update apt and install base packages
      apt:
        name: [curl, gnupg, ca-certificates, chrony]
        state: present
        update_cache: no # 上で更新済みのため
      register: apt_res
      until: apt_res is success
      retries: 5
      delay: 10

    # ... (以降の Docker インストールタスクは既存のロジックを維持)