---
- name: Full VM Provisioning and Container Deployment
  hosts: azure_vms
  become: yes
  gather_facts: yes
  
  vars:
    # 構成図に合わせて設定
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

  tasks:
    # 1. 接続が確立するまで待機
    - name: Wait for SSH connection
      wait_for_connection:
        delay: 5
        timeout: 300

    # 2. bootstrap.sh が完了するまで待機（フラグファイルの確認）
    - name: Wait until bootstrap.sh is 100% finished
      wait_for:
        path: /var/tmp/bootstrap_complete
        state: present
        timeout: 300

    # 3. パッケージインストール（ベース）
    - name: Update apt and install base packages
      apt:
        name: 
          - curl
          - gnupg
          - ca-certificates
          - chrony
          - python3-pip
          - python3-docker # AnsibleからDockerを操作するために必要
        state: present
        update_cache: yes
        cache_valid_time: 3600
      register: apt_res
      until: apt_res is success
      retries: 5
      delay: 10

    # 4. タイムゾーン設定
    - name: Set timezone to Asia/Tokyo
      timezone:
        name: "Asia/Tokyo"

    # 5. Docker 公式 GPG キーの追加
    - name: Add Docker's official GPG key
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present
      register: gpg_res
      until: gpg_res is success
      retries: 3

    # 6. Docker リポジトリの追加
    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present

    # 7. Docker のインストール
    - name: Install Docker engine
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes
      register: docker_install
      until: docker_install is success
      retries: 5

    # 8. Docker サービスの起動と有効化
    - name: Ensure Docker is started and enabled
      systemctl:
        name: docker
        state: started
        enabled: yes

    # 9. 実行ユーザー(admin_username)を docker グループに追加
    - name: Add admin user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # 10. 【構成図の実現】Nginx コンテナを Port 80 で起動
    # ロードバランサーが 8080 で受け、この 80 へ転送してきます
    - name: Launch Nginx container (Frontend/Backend Sample)
      docker_container:
        name: web-app
        image: nginx:latest
        state: started
        restart_policy: always
        published_ports:
          - "80:80"
        env:
          NGINX_HOST: localhost
          NGINX_PORT: 80

    # 11. 最終確認
    - name: Check if container is running
      command: docker ps
      register: docker_ps_output
      changed_when: false

    - name: Display docker ps result
      debug:
        var: docker_ps_output.stdout_lines