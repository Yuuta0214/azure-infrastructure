---
- name: "Deployment of Web Service (Nginx/App/DB)"
  hosts: all
  become: yes
  gather_facts: no # 初期待機のために一旦オフ

  vars:
    # docker-compose で使用するディレクトリ
    project_root: "/home/{{ admin_username }}/app"

  tasks:
    # ==========================================
    # 1. 箱の準備完了を待機 (境界線の同期)
    # ==========================================
    - name: "Wait for bootstrap.sh to complete"
      ansible.builtin.wait_for:
        path: /var/tmp/bootstrap_complete
        state: present
        timeout: 600
        msg: "Infrastructure bootstrap did not complete within 10 minutes."

    - name: "Gather facts after bootstrap"
      ansible.builtin.setup:

    # ==========================================
    # 2. Docker 環境のセットアップ
    # ==========================================
    - name: "Install Docker dependencies"
      ansible.builtin.apt:
        name: [apt-transport-https, ca-certificates, curl, gnupg, lsb-release]
        state: present
        update_cache: yes

    - name: "Add Docker's official GPG key"
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present
        keyring: /etc/apt/keyrings/docker.gpg

    - name: "Add Docker repository"
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: "Install Docker Engine and Compose Plugin"
      ansible.builtin.apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: yes
      notify: "Start and enable docker"

    # ==========================================
    # 3. アプリケーション実行環境の構築
    # ==========================================
    - name: "Create project directory structure"
      ansible.builtin.file:
        path: "{{ project_root }}/{{ item }}"
        state: directory
        owner: "{{ admin_username }}"
        group: "{{ admin_username }}"
        mode: '0755'
      loop: [ '', 'nginx', 'app', 'db_data' ]

    - name: "Deploy docker-compose.yml from template"
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ project_root }}/docker-compose.yml"
        owner: "{{ admin_username }}"
        group: "{{ admin_username }}"
        mode: '0644'
      register: compose_file

    # ==========================================
    # 4. コンテナ起動 (3層構造)
    # ==========================================
    - name: "Run docker compose up"
      ansible.builtin.command:
        cmd: "docker compose up -d --remove-orphans"
        chdir: "{{ project_root }}"
      when: compose_file.changed
      register: docker_output
      changed_when: "'Started' in docker_output.stdout or 'Created' in docker_output.stdout"

  handlers:
    - name: "Start and enable docker"
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes