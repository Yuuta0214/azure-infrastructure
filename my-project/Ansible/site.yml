---
- name: Full VM Provisioning and Container Deployment
  hosts: azure_vms
  become: yes
  # 【重要】実行直後の自動的なFacts取得（apt参照を含む）による衝突を避けるため一度無効化
  gather_facts: no

  vars:
    target_timezone: "Asia/Tokyo"
    required_packages:
      - curl
      - gnupg
      - ca-certificates
      - chrony

  tasks:
    # --- 0. OSロック解除待機 (Gathering Facts前に実行) ---
    - name: Wait for apt/dpkg lock to be released
      shell: |
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock >/dev/null 2>&1; do
          sleep 5
        done
      changed_when: false

    - name: Gathering Facts
      setup:

    # --- 1. 同期・初期確認 ---
    - name: Wait for infrastructure bootstrap to complete
      wait_for:
        path: /var/tmp/bootstrap_complete
        state: present
        timeout: 300

    - name: Get remote user home directory
      shell: "getent passwd {{ ansible_user }} | cut -d: -f6"
      register: user_home
      changed_when: false

    # --- 2. OSレイヤーの設定 (システム基盤) ---
    - name: Set timezone
      timezone:
        name: "{{ target_timezone }}"

    - name: Install base system packages
      apt:
        name: "{{ required_packages }}"
        state: present
        update_cache: yes
      register: base_install
      until: base_install is success
      retries: 10 # 5回から10回に強化し、より確実に
      delay: 10

    - name: Ensure chrony (NTP) is running
      service:
        name: chrony
        state: started
        enabled: yes

    # --- 3. Dockerインストール (ミドルウェア層) ---
    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/debian/gpg # URLのタイポ（download.download.com）を修正
        state: present
        keyring: /etc/apt/keyrings/docker.gpg

    - name: Add Docker Repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine and Plugins
      apt:
        pkg:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes
      register: docker_install
      until: docker_install is success
      retries: 10 # 5回から10回に強化
      delay: 10

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    # --- 4. アプリケーションデプロイ (コンテナ層) ---
    - name: Create app directory
      file:
        path: "{{ user_home.stdout }}/app"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Deploy docker-compose.yml from template
      template:
        src: docker-compose.yml.j2
        dest: "{{ user_home.stdout }}/app/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Start containers with Docker Compose
      command:
        cmd: "docker compose up -d"
        chdir: "{{ user_home.stdout }}/app"
      register: compose_output
      changed_when: "'Started' in compose_output.stdout or 'Created' in compose_output.stdout or 'Running' in compose_output.stdout"

    - name: Check container status
      command:
        cmd: "docker compose ps"
        chdir: "{{ user_home.stdout }}/app"
      register: ps_output
      changed_when: false

    - name: Show container status
      debug:
        msg: "{{ ps_output.stdout_lines }}"