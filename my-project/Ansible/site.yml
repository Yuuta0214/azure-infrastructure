---
- name: Setup Web/App/DB Containers
  hosts: docker_hosts
  become: yes

  vars: {}

  tasks:
    - name: Get remote user home directory
      shell: "getent passwd {{ ansible_user }} | cut -d: -f6"
      register: user_home
      changed_when: false

    # --- 修正ポイント ---
    # ignore_errors: yes を加えることで、Dockerインストール中の「コマンドが見つからない」
    # という状態を即座にエラー終了させず、untilによるリトライを継続させます。
    - name: Wait for Docker to be installed by bootstrap.sh
      command: docker --version
      register: docker_check
      until: docker_check.rc == 0
      retries: 30       # クラウドの負荷を考慮し、最大7.5分まで延長
      delay: 15
      changed_when: false
      ignore_errors: yes

    - name: Create app directory
      file:
        path: "{{ user_home.stdout }}/app"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Deploy docker-compose.yml
      template:
        src: docker-compose.yml.j2
        dest: "{{ user_home.stdout }}/app/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      # 以前問題になった変数の二重定義を避け、
      # テンプレート側の default() 設定に解決を任せます

    - name: Start containers with Docker Compose
      command:
        cmd: "docker compose up -d"
        chdir: "{{ user_home.stdout }}/app"
      register: compose_output
      changed_when: "'Started' in compose_output.stdout or 'Created' in compose_output.stdout or 'Running' in compose_output.stdout"

    - name: Check container status
      command:
        cmd: "docker compose ps"
        chdir: "{{ user_home.stdout }}/app"
      register: ps_output
      changed_when: false

    - name: Show container status
      debug:
        msg: "{{ ps_output.stdout_lines }}"