---
- name: Setup Web/App/DB Containers
  hosts: docker_hosts
  become: yes

  # ループの原因となる vars セクションを削除、または空にします
  vars: {}

  tasks:
    - name: Get remote user home directory
      shell: "getent passwd {{ ansible_user }} | cut -d: -f6"
      register: user_home
      changed_when: false

    - name: Create app directory
      file:
        path: "{{ user_home.stdout }}/app"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Deploy docker-compose.yml
      template:
        src: docker-compose.yml.j2
        dest: "{{ user_home.stdout }}/app/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      # 【重要】ここで変数を定義することで、自己参照ループを防ぎつつ
      # docker-compose.yml.j2 内の {{ mysql_root_password }} に値を渡します
      vars:
        mysql_root_password: "{{ mysql_root_password | default('password123') }}"
        mysql_db_name: "{{ mysql_db_name | default('myapp_db') }}"

    - name: Start containers with Docker Compose
      command:
        cmd: "docker compose up -d"
        chdir: "{{ user_home.stdout }}/app"
      register: compose_output
      changed_when: "'Started' in compose_output.stdout or 'Created' in compose_output.stdout or 'Running' in compose_output.stdout"

    - name: Check container status
      command:
        cmd: "docker compose ps"
        chdir: "{{ user_home.stdout }}/app"
      register: ps_output
      changed_when: false

    - name: Show container status
      debug:
        msg: "{{ ps_output.stdout_lines }}"