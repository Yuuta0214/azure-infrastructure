# ==========================================
# Azure VM Inventory Configuration
# ==========================================

[azure_vms]
# 【修正】外部（--extra-vars）から渡される target_ip を受け取るための定義を追加
target_vm ansible_host={{ target_ip | default('127.0.0.1') }}

[azure_vms:vars]
# 1. 基本接続設定
ansible_python_interpreter=/usr/bin/python3
# 実行ユーザーも外部から注入可能にします（デフォルトは azureuser）
ansible_user={{ admin_username | default('azureuser') }}

# 2. 認証設定
# 【修正】GitHub Actions環境に応じて上書きできるよう変数化。デフォルトは一般的なパスを指定
ansible_ssh_private_key_file={{ ssh_key_path | default('~/.ssh/id_rsa') }}

# 3. SSH 接続オプション (ベストプラクティス)
# 接続の再利用(ControlPersist)と、クラウドの不安定な起動直後を考慮したリプライ設定。
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ConnectionAttempts=10 -o ControlMaster=auto -o ControlPersist=60s'

# 4. パイプライニングの有効化
# SSH通信回数を削減し、Azure環境でのデプロイ速度を最大化。
ansible_ssh_pipelining=True