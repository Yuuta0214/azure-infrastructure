[azure_vms]
# target_vm は、Terraform の output で得られる「プライベートIP」を指定します。
# 実行時に ansible-playbook -i inventory.ini -e "target_ip=10.0.2.4" のように上書き可能です。
target_vm ansible_host={{ target_ip | default('placeholder_ip') }}

[azure_vms:vars]
# 1. 基本接続設定
ansible_user=azureuser
ansible_python_interpreter=/usr/bin/python3

# 2. 認証設定
# 鍵のパスは GitHub Actions 実行環境のパスに合わせて調整してください。
ansible_ssh_private_key_file=~/.ssh/id_rsa

# 3. SSH 接続オプション（Bastion 経由 & 安定化設定）
# -o ProxyCommand を使用して Bastion トンネル経由で接続する場合はここを拡張しますが、
# 「az network bastion tunnel」を別プロセスで立てる運用なら、以下の設定で 127.0.0.1 経由での接続も可能です。
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ConnectionAttempts=10 -o ControlMaster=auto -o ControlPersist=60s'

# 4. Ansible 実行の挙動最適化
# Azure VM の起動直後は不安定な場合があるため、リトライを有効化
[defaults]
host_key_checking = False
retries = 3