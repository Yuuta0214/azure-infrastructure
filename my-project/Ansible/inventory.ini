[docker_hosts]
# ansible_host: GitHub Actions 実行時に --extra-vars で上書きするため、プレースホルダーにします
# ansible_user: Terraform と整合性を取るため変数化します
vm_host ansible_host={{ target_ip | default('127.0.0.1') }} ansible_user={{ admin_username | default('azureuser') }}

[docker_hosts:vars]
# SSH接続時のインタープリタを指定（Debian 12に合わせて明示）
ansible_python_interpreter=/usr/bin/python3

# 接続時の安全策
ansible_ssh_common_args='-o StrictHostKeyChecking=no'