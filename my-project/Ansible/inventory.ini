[docker_hosts]
# ホスト名（識別子）を定義
vm_host

[docker_hosts:vars]
# 【修正】コマンドライン引数（-e）で渡される値を優先するため、
# シンプルに変数名のみを紐付けます。
ansible_host={{ target_ip }}
ansible_user={{ admin_username }}

# SSH接続時のパスワード（GitHub Actionsから渡される変数）
ansible_password={{ ansible_password }}

# SSH接続時のインタープリタを指定（Debian 12の標準パス）
ansible_python_interpreter=/usr/bin/python3

# 接続時の安全策
# 初回接続時のフィンガープリント確認をスキップし、自動化を止めないための設定
ansible_ssh_common_args='-o StrictHostKeyChecking=no'