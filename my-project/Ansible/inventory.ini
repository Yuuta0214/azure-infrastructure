[docker_hosts]
# ホスト名（識別子）のみを定義します
vm_host

[docker_hosts:vars]
# 変数はこのセクションにまとめます
# ansible_host は実行時に上書きされるため、デフォルト値を設定しておきます
ansible_host={{ target_ip | default('127.0.0.1') }}
ansible_user={{ admin_username | default('azureuser') }}

# SSH接続時のインタープリタを指定
ansible_python_interpreter=/usr/bin/python3

# 接続時の安全策
ansible_ssh_common_args='-o StrictHostKeyChecking=no'