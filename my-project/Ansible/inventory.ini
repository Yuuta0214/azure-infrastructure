# ==========================================
# Azure VM Inventory Configuration
# ==========================================

[azure_vms]
# Terraformのoutputから渡されるIPアドレスを受け取るためのプレースホルダー。
# 実行時に -e "target_ip=xxx" で動的に上書きします。
target_vm ansible_host={{ target_ip | default('127.0.0.1') }}

[azure_vms:vars]
# 1. 基本接続設定
# bootstrap.sh で導入される Python3 を明示的に指定
ansible_user={{ admin_username | default('azureuser') }}
ansible_python_interpreter=/usr/bin/python3

# 2. 認証設定
# GitHub Actions上のパス (~/.ssh/id_rsa) に合わせます
ansible_ssh_private_key_file=~/.ssh/id_rsa

# 3. SSH 接続オプション (ベストプラクティス)
# - ControlMaster/ControlPersist: 接続を使い回し、タスクごとのオーバーヘッドを削減
# - StrictHostKeyChecking=no: 初回接続時の対話プロンプトを抑制
# - ConnectTimeout/ConnectionAttempts: VM起動直後の不安定なタイミングでの失敗を防止
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ConnectionAttempts=10 -o ControlMaster=auto -o ControlPersist=60s'

# 4. パイプライニングの有効化
# SSH接続回数を減らし、実行速度を大幅に向上させます
ansible_ssh_pipelining=True

# ==========================================
# 注意: [defaults] セクションは ansible.cfg 用の設定項目であるため、
# インベントリファイル内では変数として定義するか、別途 ansible.cfg を用意します。
# ここでは変数を経由して安定性を確保します。
# ==========================================