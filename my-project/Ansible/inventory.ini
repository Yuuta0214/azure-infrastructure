[azure_vms]
# インフラ作成時に出力されたIPを、実行時に -e で指定します
target_vm ansible_host=placeholder_ip

[azure_vms:vars]
# SSH ユーザー
ansible_user=azureuser

# パスワードではなく、秘密鍵を使うのがベストプラクティス
# GitHub Actions のワークフローで --private-key オプションを使用してください
ansible_ssh_private_key_file=~/.ssh/id_rsa

# インタープリタ指定
ansible_python_interpreter=/usr/bin/python3

# 接続時の安全策とリトライ設定（Azure環境でのタイムアウト対策）
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ConnectionAttempts=10 -o UserKnownHostsFile=/dev/null'