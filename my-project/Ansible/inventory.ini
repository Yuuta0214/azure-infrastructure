[azure_vms]
vm_01

[azure_vms:vars]
# コマンドライン引数（-e）で渡される値を紐付け
ansible_host={{ target_ip }}
ansible_user={{ admin_username }}

# SSH接続時のパスワード
ansible_password={{ ansible_password }}

# SSH接続時のインタープリタを指定
ansible_python_interpreter=/usr/bin/python3

# 接続時の安全策とリトライ設定
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ConnectionAttempts=10'