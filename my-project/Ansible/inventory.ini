# ==========================================
# Azure VM Inventory Configuration
# ==========================================

[azure_vms]
# パースエラーを避けるため、Jinja2構文を排除。
# 実行時に main.yml の --extra-vars で接続情報を強制注入します。
target_vm

[azure_vms:vars]
# 1. 基本接続設定
# インタープリタのみ固定し、ユーザー名は実行時に動的注入します。
ansible_python_interpreter=/usr/bin/python3

# 2. 認証設定
# GitHub Actions上のパスに固定
ansible_ssh_private_key_file=~/.ssh/id_rsa

# 3. SSH 接続オプション (ベストプラクティス)
# 接続の再利用(ControlPersist)と、クラウドの不安定な起動直後を考慮したリトライ設定。
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ConnectionAttempts=10 -o ControlMaster=auto -o ControlPersist=60s'

# 4. パイプライニングの有効化
# SSH通信回数を削減し、Azure環境でのデプロイ速度を最大化。
ansible_ssh_pipelining=True