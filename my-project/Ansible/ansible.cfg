[defaults]
# ==========================================
# 1. 基本設定
# ==========================================
# デフォルトのインベントリ場所を指定
inventory      = ./inventory.ini

# Azure VMの再作成（同一IPでの別ホスト扱い）に柔軟に対応するため、指紋チェックを無効化
host_key_checking = False

# 並列実行数。VMが増えた際も効率的に処理を行います
forks          = 10

# デバッグが容易になるよう、標準出力を読みやすい YAML 形式に固定
stdout_callback = yaml

# ==========================================
# 2. タイムアウト・リトライ設定
# ==========================================
# クラウド環境特有のレイテンシを考慮し、余裕を持った設定にします
timeout        = 60

# 失敗時にホームディレクトリを汚さないよう無効化
retry_files_enabled = False

# ==========================================
# 3. ログ記録 (運用ベストプラクティス)
# ==========================================
# GitHub Actionsの実行ログだけでなく、ローカルでも詳細を確認可能にします
log_path       = ./ansible.log

# ==========================================
# 4. 特権実行の設定
# ==========================================
[privilege_escalation]
become         = True
become_method  = sudo
become_user    = root
become_ask_pass = False

# ==========================================
# 5. SSH 接続最適化 (最重要設定)
# ==========================================
[ssh_connection]
# SSHのセッション数を劇的に減らし、実行速度を数倍〜数十倍に引き上げます
pipelining     = True

# ControlPersist を 300秒（5分）に設定。
# これにより、Bastion経由のトンネルが一度確立されれば、タスク間の再接続待機時間をゼロにします。
ssh_args       = -o ControlMaster=auto -o ControlPersist=300s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

# 転送方法の安定化
scp_if_ssh     = True