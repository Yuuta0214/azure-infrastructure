[defaults]
# インベントリファイルの場所を指定
inventory = ./inventory.ini

# 初回接続時のホストキー確認をスキップ（Azure VMのように頻繁に作り直す環境では必須）
host_key_checking = False

# 【修正】接続ユーザー名はGitHub Actions（変数）から渡すため、ここでは指定しない
# remote_user = azureuser

# 実行時の出力を読みやすくする設定
stdout_callback = yaml

# 接続失敗時のリトライ回数とタイムアウト設定（クラウド環境の瞬断対策）
timeout = 30

[privilege_escalation]
# sudo権限での実行をデフォルトにする設定
become = True
become_method = sudo
become_user = root
become_ask_pass = False