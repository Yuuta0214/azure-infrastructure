[defaults]
# 1. 基本設定
# インベントリは実行時に指定するため、デフォルトはカレントディレクトリを指すようにします
inventory      = ./inventory.ini
# 初回接続時の Fingerprint 確認をスキップ（Azure VM の作り直しに対応）
host_key_checking = False
# 並列実行数。小規模環境なら 5〜10 が適切です
forks          = 5
# 出力結果を読みやすい YAML 形式に変更
stdout_callback = yaml

# 2. タイムアウト・リトライ設定
# クラウド環境のネットワーク瞬断や起動直後の遅延を考慮
timeout        = 60
# 接続に失敗した際の .retry ファイルの作成を制御（不要なら False）
retry_files_enabled = False

# 3. ログ記録（トラブルシューティング用）
# デプロイ失敗時の原因特定を容易にするため、ログ保存を推奨
log_path       = ./ansible.log

[privilege_escalation]
# 特権実行（sudo）のデフォルト設定
become         = True
become_method  = sudo
become_user    = root
become_ask_pass = False

[ssh_connection]
# 4. パイプラインと接続維持（Bastion経由では非常に重要）
# Python モジュールを SSH 経由で直接実行し、通信往復を劇的に削減
pipelining     = True

# SSH トンネルを一定時間維持し、タスクごとの SSH 接続オーバーヘッドを排除
# ControlPersist を長めに設定することで、Bastion 経由でもキビキビ動きます
ssh_args       = -o ControlMaster=auto -o ControlPersist=300s -o StrictHostKeyChecking=no