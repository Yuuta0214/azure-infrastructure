[defaults]
# 【修正】実行時に -i で指定するため、静的インベントリの指定はコメントアウト
# inventory = ./inventory.ini

# 初回接続時のホストキー確認をスキップ（Azure VMのように頻繁に作り直す環境では必須）
host_key_checking = False

# 【追加】パイプライン処理を有効化（SSH接続回数を減らし、実行速度と安定性を向上）
pipelining = True

# 【追加】並列実行数を指定（リソースの少ないVMでも安定させるため）
forks = 5

# 実行時の出力を読みやすくする設定
stdout_callback = yaml

# 接続失敗時のリトライ回数とタイムアウト設定（クラウド環境の瞬断対策）
timeout = 30

[privilege_escalation]
# sudo権限での実行をデフォルトにする設定
become = True
become_method = sudo
become_user = root
become_ask_pass = False