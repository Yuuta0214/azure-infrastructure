##########################################################################
# Azure Infrastructure Build Workflow (02_compute 層)
##########################################################################
name: '02-compute-Deploy'

on:
  workflow_dispatch: # 手動実行のみ

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 5. Plan & Check (02_compute 層)
  # =============================================================
  terraform-plan-compute:
    name: '5. Plan & Check (02_compute)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # mainブランチならprod、それ以外はdevとして扱う整合性維持
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 5-1, Checkout Code
        uses: actions/checkout@v4

      - name: 5-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 5-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # 【整合性修正】00_backend との整合性を確保するため、動的にバックエンド情報を注入
      - name: 5-4, Terraform Init
        working-directory: ./my-project/02_compute
        run: |
          if [ "${{ env.TARGET_ENV }}" = "prod" ]; then
            RG_BACKEND="rg-web-prod-mgmt"
            ST_BACKEND="stwebprodbackend"
          else
            RG_BACKEND="rg-web-dev-mgmt"
            ST_BACKEND="stwebdevbackend"
          fi
          terraform init \
            -backend-config="resource_group_name=${RG_BACKEND}" \
            -backend-config="storage_account_name=${ST_BACKEND}"

      - name: 5-5, Terraform Plan
        working-directory: ./my-project/02_compute
        run: terraform plan -var-file="env-${{ env.TARGET_ENV }}.tfvars" -out=tfplan

      - name: 5-6, Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-compute-artifacts
          path: ./my-project/02_compute/tfplan

  # =============================================================
  # 6. Apply & Deploy (02_compute 層)
  # =============================================================
  terraform-apply-compute:
    name: '6. Apply & Deploy (02_compute)'
    needs: terraform-plan-compute
    environment: 'production'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 6-1, Checkout Code
        uses: actions/checkout@v4

      - name: 6-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 6-3, Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-compute-artifacts
          path: ./my-project/02_compute

      - name: 6-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # 【整合性修正】Apply時も同一のバックエンドを参照するようInitを構成
      - name: 6-5, Terraform Init
        working-directory: ./my-project/02_compute
        run: |
          if [ "${{ env.TARGET_ENV }}" = "prod" ]; then
            RG_BACKEND="rg-web-prod-mgmt"
            ST_BACKEND="stwebprodbackend"
          else
            RG_BACKEND="rg-web-dev-mgmt"
            ST_BACKEND="stwebdevbackend"
          fi
          terraform init \
            -backend-config="resource_group_name=${RG_BACKEND}" \
            -backend-config="storage_account_name=${ST_BACKEND}"

      - name: 6-6, Terraform Apply
        working-directory: ./my-project/02_compute
        run: terraform apply -auto-approve tfplan