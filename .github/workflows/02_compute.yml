##########################################################################
# Azure Infrastructure Build Workflow (02_compute 層)
##########################################################################
# 目的: 02_compute 層（VM基盤）のデプロイ
# 特徴: OIDC認証、環境別State管理、Artifactによるプラン継承
##########################################################################
name: '02-compute-Deploy'

on:
  workflow_dispatch: # 手動実行による制御

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 5. Plan & Check (02_compute 層)
  # =============================================================
  terraform-plan-compute:
    name: '5. Plan & Check (02_compute)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # ブランチに応じて環境を判定 (mainならprod、それ以外はdev)
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 5-1, Checkout Code
        uses: actions/checkout@v4

      - name: 5-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 5-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 5-4, Terraform Init
        # 【整合性修正】00_backend で作成した環境別ストレージへ動的に接続
        working-directory: ./my-project/02_compute
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-web-${{ env.TARGET_ENV }}-mgmt" \
            -backend-config="storage_account_name=stweb${{ env.TARGET_ENV }}backend" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=compute.tfstate"

      - name: 5-5, Terraform Format Check
        working-directory: ./my-project/02_compute
        run: terraform fmt -check

      - name: 5-6, Terraform Plan
        # 【整合性修正】env-dev.tfvars または env-prod.tfvars を正確に選択
        working-directory: ./my-project/02_compute
        run: |
          terraform plan \
            -var-file="env-${{ env.TARGET_ENV }}.tfvars" \
            -out=tfplan-compute

      - name: 5-7, Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-compute-artifacts
          path: ./my-project/02_compute/tfplan-compute
          retention-days: 1

  # =============================================================
  # 6. Apply & Deploy (02_compute 層)
  # =============================================================
  terraform-apply-compute:
    name: '6. Apply & Deploy (02_compute)'
    needs: terraform-plan-compute
    if: github.event_name == 'workflow_dispatch'
    environment: 'production' # 承認プロセスのため本番環境保護を推奨
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 6-1, Checkout Code
        uses: actions/checkout@v4

      - name: 6-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 6-3, Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-compute-artifacts
          path: ./my-project/02_compute

      - name: 6-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 6-5, Terraform Init
        # 【整合性修正】Plan時と同一のバックエンド構成で初期化
        working-directory: ./my-project/02_compute
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-web-${{ env.TARGET_ENV }}-mgmt" \
            -backend-config="storage_account_name=stweb${{ env.TARGET_ENV }}backend" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=compute.tfstate"

      - name: 6-6, Terraform Apply
        # セキュリティ・運用ベストプラクティス: 保存されたプランのみを適用
        working-directory: ./my-project/02_compute
        run: terraform apply -auto-approve tfplan-compute