##########################################################################
# 00_Backend Deployment Workflow
##########################################################################
# 目的: Terraform State保存用のストレージ基盤のみをデプロイする
# 特徴: 00_backendディレクトリ専用、OIDC認証、本番環境への手動承認
##########################################################################
name: 00-Backend-Deploy

on:
  workflow_dispatch: # 手動実行のみ（main_20260513.ymlの仕様に準拠）

permissions:
  contents: read
  id-token: write # OIDC認証のために必須

jobs:
  # =============================================================
  # 1. Plan & Check (00_backend 層)
  # =============================================================
  terraform-plan-backend:
    name: '1. Plan & Check (00_backend)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # mainブランチならprod、それ以外ならdevのtfvarsを使用
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 1-4, Terraform Init
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 1-5, Terraform Plan
        working-directory: ./my-project/00_backend
        run: |
          terraform plan -var-file="env-${{ env.TARGET_ENV }}.tfvars" -out=tfplan-backend

      # 2回目以降の冪等性を守るため、プラン結果を一時保存
      - name: 1-6, Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-backend-artifacts
          path: ./my-project/00_backend/tfplan-backend

  # =============================================================
  # 2. Apply & Deploy (00_backend 層)
  # =============================================================
  terraform-apply-backend:
    name: '2. Apply & Deploy (00_backend)'
    needs: terraform-plan-backend
    # GitHubのEnvironment機能により、本番環境実行時に手動承認を要求する
    environment: 'production' 
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 2-3, Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-backend-artifacts
          path: ./my-project/00_backend

      - name: 2-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 2-5, Terraform Init
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 2-6, Terraform Apply
        working-directory: ./my-project/00_backend
        run: terraform apply -auto-approve tfplan-backend