name: 'Azure Infrastructure Build'
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-plan:
    name: '1. Plan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Terraform Plan
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          cd ./my-project/terraform && terraform init && terraform plan -lock=false -var-file=$VAR_FILE

  terraform-apply:
    name: '2. Apply'
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' # 本番誤爆防止
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Terraform Apply
        run: |
          cd ./my-project/terraform && terraform init && terraform apply -var-file=env-prod.tfvars -auto-approve
      - name: Ansible Execution
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_PASSWORD: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
        run: |
          cd ./my-project/Ansible
          VM_IP=$(cd ../terraform && terraform output -raw alb_public_ip)
          ansible-playbook -i inventory.ini site.yml \
            -e "target_ip=$VM_IP" \
            -e "admin_username=$TF_VAR_admin_username" \
            -e "ansible_password=$ANSIBLE_PASSWORD"