name: 'Azure Infrastructure Build'

# mainブランチにコードが送信(Push)されたら起動する
on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform Execution'
    runs-on: ubuntu-latest # GitHub側のサーバーを使用するため、PCは汚れません

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 接続テスト: Azureのアカウント情報を表示する
    - name: Check Azure Connection
      run: az account show