##########################################################################
# Azure Infrastructure Build Workflow
##########################################################################
# 厳守ルール：
# 1. main_20260513.yml のステップ名、パス、変数を1文字も変えずに維持する
# 2. 表示ジョブは2つ（Plan/Apply）に集約し、各ジョブ内で 00 -> 01 を順次実行
# 3. 01_network の init は Backend 未作成状態を考慮し -backend=false で計画
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: # 手動実行のみ

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Plan & Check ジョブ (00_backend -> 01_network)
  # =============================================================
  terraform-plan-all:
    name: '1. Plan & Check (All Layers)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --- 00_backend ---
      - name: 1-4, Terraform Init
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 1-5, Terraform Plan
        working-directory: ./my-project/00_backend
        run: |
          terraform plan \
            -var-file="../00_backend/env-${{ env.TARGET_ENV }}.tfvars" \
            -out=tfplan-backend

      # --- 01_network ---
      - name: 3-4, Terraform Init
        # セキュリティ・運用ベストプラクティス: Backend未作成状態での構成検証のため -backend=false を使用
        working-directory: ./my-project/01_network
        run: terraform init -backend=false

      - name: 3-5, Terraform Plan
        working-directory: ./my-project/01_network
        run: |
          terraform plan \
            -var-file="../01_network/env-${{ env.TARGET_ENV }}.tfvars" \
            -out=tfplan-network

      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-terraform-plans
          path: |
            ./my-project/00_backend/tfplan-backend
            ./my-project/01_network/tfplan-network

  # =============================================================
  # 2. Apply & Deploy ジョブ (00_backend -> 01_network)
  # =============================================================
  terraform-apply-all:
    name: '2. Apply & Deploy (All Layers)'
    needs: terraform-plan-all
    environment: 'production'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download All Plan Artifacts
        uses: actions/download-artifact@v4
        with:
          name: all-terraform-plans
          path: ./artifacts

      - name: 4-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --- 00_backend Apply ---
      - name: 2-5, Terraform Init
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 2-6, Terraform Apply
        working-directory: ./my-project/00_backend
        run: terraform apply -auto-approve ../../artifacts/my-project/00_backend/tfplan-backend

      # --- 01_network Apply ---
      - name: 4-5, Terraform Init
        # 運用ベストプラクティス: 00で作成されたリソースを動的にBackendとして指定し、一貫性を保持
        working-directory: ./my-project/01_network
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-web-${{ env.TARGET_ENV }}-mgmt" \
            -backend-config="storage_account_name=stweb${{ env.TARGET_ENV }}backend" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=network.tfstate"

      - name: 4-6, Terraform Apply
        working-directory: ./my-project/01_network
        run: terraform apply -auto-approve ../../artifacts/my-project/01_network/tfplan-network