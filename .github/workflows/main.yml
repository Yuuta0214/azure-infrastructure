name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-plan:
    name: '1. Terraform Plan (Test)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: terraform plan

  terraform-apply:
    name: '2. Terraform Apply & Ansible Deploy'
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: terraform apply -auto-approve

      # Ansible実行前にVMのSSHサービスが起動するのを待機
      - name: Sleep for 60 seconds
        run: sleep 60

      # TerraformのOutputからIPアドレスを取得してAnsibleに渡す（自動化のポイント）
      - name: Run Ansible Playbook
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          # 実行時にSecretsからパスワードを注入
          ANSIBLE_PASSWORD: ${{ secrets.TF_VAR_admin_password }}
        run: |
          # Terraformディレクトリへ一時的に戻り、IPを取得
          VM_IP=$(cd ../terraform && terraform output -raw alb_public_ip)
          
          # 取得したIPを使ってPlaybookを実行
          # inventory内のIPアドレスを動的に上書き、または直接指定
          ansible-playbook -i inventory.ini site.yml \
            -e "ansible_host=$VM_IP" \
            -e "ansible_password=$ANSIBLE_PASSWORD"