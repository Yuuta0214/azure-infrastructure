name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------
  # 1. 共通変数のセットアップ
  # ----------------------------------------------------------
  terraform-setup:
    name: 'Setup Environment'
    runs-on: ubuntu-latest
    outputs:
      state_file: ${{ steps.vars.outputs.state_file }}
      var_file: ${{ steps.vars.outputs.var_file }}
      environment: ${{ steps.vars.outputs.environment }}
    steps:
      - id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "state_file=prod.tfstate" >> $GITHUB_OUTPUT
            echo "var_file=env-prod.tfvars" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "state_file=test.tfstate" >> $GITHUB_OUTPUT
            echo "var_file=env-test.tfvars" >> $GITHUB_OUTPUT
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

  # ----------------------------------------------------------
  # 2. Terraform Plan & Backend Preparation
  # ----------------------------------------------------------
  terraform-plan:
    name: 'Terraform Plan'
    needs: terraform-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Backend Storage Exists
        run: |
          RG_NAME="rg-storage-state"
          ST_NAME="sttfstate20260506yuta"
          CONTAINER="tfstate"
          LOCATION="japaneast"
          if ! az group show --name $RG_NAME &>/dev/null; then
            az group create --name $RG_NAME --location $LOCATION
          fi
          if ! az storage account show --name $ST_NAME --resource-group $RG_NAME &>/dev/null; then
            az storage account create --name $ST_NAME --resource-group $RG_NAME --sku Standard_LRS --encryption-services blob
          fi
          CONNECTION_STRING=$(az storage account show-connection-string --name $ST_NAME --resource-group $RG_NAME --query connectionString -o tsv)
          az storage container create --name $CONTAINER --connection-string "$CONNECTION_STRING" || true

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Plan
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          # 公開鍵がSecretにない場合でもエラーを防ぐため、デフォルト値を設定
          TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY || 'ssh-rsa AAAAB3Nza1yc2EAAAADAQABAAAB...' }}
        run: |
          terraform init -backend-config="key=${{ needs.terraform-setup.outputs.state_file }}"
          # -out=tfplan を指定して、プラン結果を明示的に保存し、詳細なエラーを吐き出させます
          terraform plan -var-file=${{ needs.terraform-setup.outputs.var_file }} -out=tfplan

  # ----------------------------------------------------------
  # 3. Apply & Ansible Deploy
  # ----------------------------------------------------------
  terraform-apply:
    name: 'Apply & Ansible Deploy'
    needs: [terraform-setup, terraform-plan]
    environment: ${{ needs.terraform-setup.outputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY || 'ssh-rsa AAAAB3Nza1yc2EAAAADAQABAAAB...' }}
        run: |
          terraform init -backend-config="key=${{ needs.terraform-setup.outputs.state_file }}"
          # apply時にもvar-fileを指定して整合性を保ちます
          terraform apply -var-file=${{ needs.terraform-setup.outputs.var_file }} -auto-approve

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Ansible Deploy
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          VM_IP=$(cd ../terraform && terraform output -raw alb_public_ip)
          ansible-playbook -i inventory.ini \
            -e "target_ip=${VM_IP}" \
            -e "ansible_user=${{ secrets.TF_VAR_admin_username }}" \
            site.yml