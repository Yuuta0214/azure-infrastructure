##########################################################################
# Azure Infrastructure Build Workflow (Fixed Architecture Version)
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Terraform Plan & Check (検証フェーズ)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
      TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 【最重要】initの前にBackendの物理箱が存在することを保証する
      - name: 1-4, Ensure Backend Resources Exist
        run: |
          echo "Checking/Creating Resource Group for Terraform State..."
          az group create --name "rg-storage-state" --location "japanwest"
          
          echo "Checking/Creating Storage Account..."
          # 既に存在する場合はスキップされる
          az storage account create \
            --name "sttfstate20260506yuta" \
            --resource-group "rg-storage-state" \
            --location "japanwest" \
            --sku Standard_LRS \
            --allow-blob-public-access false

          echo "Checking/Creating Storage Container..."
          az storage container create \
            --name "tfstate" \
            --account-name "sttfstate20260506yuta" \
            --auth-mode login

      - name: 1-5, Terraform Init
        working-directory: ./my-project/02_compute
        run: terraform init -input=false

      - name: 1-6, Terraform Plan
        id: plan
        working-directory: ./my-project/02_compute
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-dev.tfvars")
          terraform plan -var-file="$VAR_FILE" -input=false -out=tfplan
          terraform show -no-color tfplan > plan_details.txt

      - name: 1-7, Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: |
            ./my-project/02_compute/tfplan
            ./my-project/02_compute/plan_details.txt
          retention-days: 1

  # =============================================================
  # 2. Terraform Apply & Ansible Deploy (実行フェーズ)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy'
    needs: terraform-plan
    environment: production-approval
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
      TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 2-3, Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: ./my-project/02_compute

      - name: 2-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Apply側でも、再初期化の前にBackendが存在することを確認
      - name: 2-5, Ensure Backend Resources Exist
        run: |
          az group create --name "rg-storage-state" --location "japanwest"
          az storage container create --name "tfstate" --account-name "sttfstate20260506yuta" --auth-mode login

      - name: 2-6, Terraform Init
        working-directory: ./my-project/02_compute
        run: terraform init -input=false

      - name: 2-7, Terraform Apply
        working-directory: ./my-project/02_compute
        run: terraform apply -input=false tfplan

      - name: 2-8, Wait for SSH Availability
        shell: bash
        run: |
          VM_IP=$(cd ./my-project/02_compute && terraform output -raw ansible_host_ip)
          echo "Target VM IP: $VM_IP"
          timeout 300 bash -c "until echo > /dev/tcp/$VM_IP/22; do sleep 10; done" || exit 1

      - name: 2-9, Ansible Provisioning
        working-directory: ./my-project/Ansible
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          ADMIN_PASS: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          ADMIN_USER: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VM_IP=$(cd ../02_compute && terraform output -raw ansible_host_ip)
          ansible-playbook -i inventory.ini site.yml \
            --extra-vars "target_ip=$VM_IP admin_username=$ADMIN_USER ansible_password=$ADMIN_PASS ansible_become_password=$ADMIN_PASS" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD"