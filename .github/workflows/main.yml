name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: 

permissions:
  contents: read
  id-token: write # OIDC認証に必須

jobs:
  # ==========================================
  # 1. 検証と計画 (Validation & Plan)
  # ==========================================
  terraform-plan:
    name: '1. 検証と計画 (Validation & Plan)'
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 【修正】判定処理を廃止し「存在を保証する（create || true）」に一本化。これでハングもエラーも防ぎます。
      - name: バックエンドストレージの存在確認
        run: |
          STORAGE_NAME="sttfstate20260506yuta"
          RG_NAME="rg-storage-state"
          LOCATION="japanwest"
          CONTAINER_NAME="tfstate"
          
          echo "Ensuring Resource Group: $RG_NAME"
          az group create --name "$RG_NAME" --location "$LOCATION" --output none

          echo "Ensuring Storage Account: $STORAGE_NAME"
          # 作成コマンドに || true を付けることで、既存でも新規でもエラーを投げずに即座に次へ進みます。
          az storage account create \
            --name "$STORAGE_NAME" \
            --resource-group "$RG_NAME" \
            --location "$LOCATION" \
            --sku Standard_LRS \
            --min-tls-version TLS1_2 \
            --allow-blob-public-access false \
            --output none || true

          echo "Ensuring Container: $CONTAINER_NAME"
          # コンテナも同様に、存在確認を挟まず作成を試みてエラーを無視させます。
          az storage container create \
            --name "$CONTAINER_NAME" \
            --account-name "$STORAGE_NAME" \
            --auth-mode login \
            --output none || true

      - name: Terraform State のリース解除
        run: |
          # リースロックによる terraform init の失敗を防止
          az storage blob lease break \
            --blob-name terraform.tfstate \
            --container-name tfstate \
            --account-name sttfstate20260506yuta || echo "No active lease to break."

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 初期化
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: 既存リソースグループのインポート (整合性確保)
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          # main.tf の命名規則 rg-${project}-${env} に完全一致させる
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"; VAR_FILE="env-prod.tfvars"; LOC="japaneast"
          else
            ENV="test"; VAR_FILE="env-test.tfvars"; LOC="japanwest"
          fi
          PROJECT="web"
          TARGET_RG="rg-$PROJECT-$ENV"
          
          # リソースグループの存在を保証してからインポート
          az group create --name "$TARGET_RG" --location "$LOC" --output none
          
          terraform import -input=false -var-file="$VAR_FILE" \
            azurerm_resource_group.rg /subscriptions/$(az account show --query id -o tsv)/resourceGroups/"$TARGET_RG" || echo "Already imported or not exists."

      - name: 構文チェック (Terraform & Ansible)
        working-directory: ./my-project
        run: |
          cd terraform && terraform validate
          cd ../Ansible && ansible-playbook site.yml --syntax-check

      - name: Terraform 実行計画の作成
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform plan -var-file="$VAR_FILE" -input=false

  # ==========================================
  # 2. 適用と Ansible デプロイ (Apply & Ansible Deploy)
  # ==========================================
  terraform-apply:
    name: '2. 適用と Ansible デプロイ (Apply & Ansible Deploy)'
    if: github.ref != 'refs/heads/main'
    needs: terraform-plan
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 初期化
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: Terraform リソース適用
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          terraform apply -var-file=env-test.tfvars -auto-approve -input=false

      - name: Ansible プレイブックの実行
        working-directory: ./my-project/Ansible
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          ADMIN_PASS: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          ADMIN_USER: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          # outputs.tf で新設した専用の Output 名 (ansible_host_ip) を使用
          VM_IP=$(cd ../terraform && terraform output -raw ansible_host_ip)
          
          ansible-playbook -i inventory.ini site.yml \
            --extra-vars "ansible_host=$VM_IP ansible_user=$ADMIN_USER ansible_password=$ADMIN_PASS" \
            -e "admin_username=$ADMIN_USER" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD"