name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  # ==========================================
  # 1. 検証と計画 (Validation & Plan)
  # ==========================================
  terraform-plan:
    name: '1. 検証と計画 (Validation & Plan)'
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: バックエンド用ストレージの存在確認と作成
        run: |
          STORAGE_NAME="sttfstate20260506yuta"
          RG_NAME="rg-storage-state"
          
          # サブスクリプションIDを取得して環境変数に格納
          SUB_ID=$(az account show --query id -o tsv)
          echo "SUBSCRIPTION_ID=$SUB_ID" >> $GITHUB_ENV

          STORAGE_EXISTS=$(az storage account list --query "[?name=='$STORAGE_NAME'].name" -o tsv)
          if [ -z "$STORAGE_EXISTS" ]; then
            az group create --name $RG_NAME --location japanwest
            az storage account create --name $STORAGE_NAME --resource-group $RG_NAME --location japanwest --sku Standard_LRS --min-tls-version TLS1_2
            az storage container create --name tfstate --account-name $STORAGE_NAME
          fi

      - name: Terraform State のリース解除
        run: |
          az storage blob lease break --blob-name terraform.tfstate --container-name tfstate --account-name sttfstate20260506yuta || echo "No lease to break"

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 初期化
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: 既存リソースグループのインポート
        working-directory: ./my-project/terraform
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET_RG="rg-web-project"; TARGET_VARS="env-prod.tfvars"; TARGET_LOC="japaneast"
          else
            TARGET_RG="rg-web-test"; TARGET_VARS="env-test.tfvars"; TARGET_LOC="japanwest"
          fi
          # リソースグループが存在しない場合のみ作成
          az group create --name $TARGET_RG --location $TARGET_LOC || true
          
          # インポート実行（失敗しても継続させることで、既存管理下にある場合に対応）
          terraform import -lock=false -var-file=$TARGET_VARS \
            azurerm_resource_group.rg /subscriptions/${{ env.SUBSCRIPTION_ID }}/resourceGroups/$TARGET_RG || echo "Already imported or not needed"

      - name: Terraform 構文チェック
        working-directory: ./my-project/terraform
        run: terraform validate

      - name: Ansible 構文チェック
        working-directory: ./my-project/Ansible
        run: ansible-playbook site.yml --syntax-check

      - name: Terraform 実行計画の作成
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          # -input=false を追加して対話入力を遮断し、終了コードを安定させる
          terraform plan -lock=false -var-file=$VAR_FILE -input=false

  # ==========================================
  # 2. 適用と Ansible デプロイ (Apply & Ansible Deploy)
  # ==========================================
  terraform-apply:
    name: '2. 適用と Ansible デプロイ (Apply & Ansible Deploy)'
    needs: terraform-plan
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 初期化
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: Terraform リソース適用
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform apply -var-file=$VAR_FILE -auto-approve -input=false

      - name: Ansible 用 SSH キー配置
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Ansible プレイブックの実行
        working-directory: ./my-project/Ansible
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          # 適用後の最新IPを取得
          VM_IP=$(cd ../terraform && terraform output -raw alb_public_ip)
          
          # インベントリファイルの不確実性を排除し、コマンドラインから接続情報を強制注入
          ansible-playbook -i inventory.ini site.yml \
            --extra-vars "ansible_host=$VM_IP ansible_user=$TF_VAR_admin_username" \
            -e "target_ip=$VM_IP" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD" \
            -e "mysql_user=webuser" \
            -e "mysql_db_name=webapp_db"