##########################################################################
# Azure Infrastructure Build Workflow
##########################################################################
name: 'Azure Infrastructure Build'

on:
  # 常に手動実行 (workflow_dispatch) で環境を選択
  workflow_dispatch:
    inputs:
      target_env:
        description: 'デプロイ対象の環境を選択'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Terraform Plan & Check (実行計画の作成と確認)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check (00_backend)'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: '1-1. Checkout Code'
        uses: actions/checkout@v4

      - name: '1-2. Azure Login'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: '1-3. Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: '1-4. Terraform Init'
        working-directory: ./00_backend
        run: terraform init

      - name: '1-5. Terraform Plan'
        id: plan
        working-directory: ./00_backend
        run: |
          terraform plan \
            -var-file="env-${{ github.event.inputs.target_env }}.tfvars" \
            -out=tfplan
        
      # Plan結果（tfplanファイル）を後続のApplyジョブに引き継ぐため一時保存
      - name: '1-6. Upload Plan Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.target_env }}
          path: 00_backend/tfplan
          retention-days: 1

  # =============================================================
  # 2. Terraform Apply & Deploy (承認後の適用実行)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy (00_backend)'
    needs: terraform-plan # Planジョブが成功していることが必須
    runs-on: ubuntu-latest
    # 【重要：安全設計】GitHub上のEnvironment設定で承認者を指定可能
    environment: ${{ github.event.inputs.target_env }}
    
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: '2-1. Checkout Code'
        uses: actions/checkout@v4

      - name: '2-2. Azure Login'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: '2-3. Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: '2-4. Terraform Init'
        working-directory: ./00_backend
        run: terraform init

      # 保存していたPlan結果をダウンロード
      - name: '2-5. Download Plan Artifact'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.target_env }}
          path: 00_backend

      - name: '2-6. Terraform Apply'
        # mainブランチかつ手動実行時のみ実行
        if: github.ref == 'refs/heads/main'
        working-directory: ./00_backend
        run: terraform apply -auto-approve tfplan