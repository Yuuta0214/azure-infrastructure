##########################################################################
# Azure Infrastructure Build Workflow
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Terraform Plan & Check (検証フェーズ)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
      TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 1-4, Ensure Backend Resources Exist
        run: |
          STORAGE_ACCOUNT="sttfstate20260506yuta"
          RG_NAME="rg-storage-state"
          LOCATION="japanwest"
          CONTAINER_NAME="tfstate"

          if ! az group show --name "$RG_NAME" &>/dev/null; then
            az group create --name "$RG_NAME" --location "$LOCATION"
          fi

          if ! az storage account show --name "$STORAGE_ACCOUNT" --resource-group "$RG_NAME" &>/dev/null; then
            az storage account create \
              --name "$STORAGE_ACCOUNT" \
              --resource-group "$RG_NAME" \
              --location "$LOCATION" \
              --sku Standard_LRS \
              --allow-blob-public-access false \
              --min-tls-version TLS1_2 
          fi

          if ! az storage container show --name "$CONTAINER_NAME" --account-name "$STORAGE_ACCOUNT" --auth-mode login &>/dev/null; then
            az storage container create --name "$CONTAINER_NAME" --account-name "$STORAGE_ACCOUNT" --auth-mode login
          fi

      - name: 1-5, Terraform Init
        working-directory: ./my-project/02_compute
        run: terraform init -input=false

      - name: 1-6, Terraform Plan
        id: plan
        working-directory: ./my-project/02_compute
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-dev.tfvars")
          terraform plan -var-file="$VAR_FILE" -input=false -out=tfplan
          terraform show -no-color tfplan > plan_details.txt

      - name: 1-7, Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: |
            ./my-project/02_compute/tfplan
            ./my-project/02_compute/plan_details.txt
          retention-days: 1

  # =============================================================
  # 2. Terraform Apply & Ansible Deploy (実行フェーズ)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy'
    # 【最重要：修正】needs: terraform-plan を削除しました。
    # ジョブの親子関係を物理的に切断することで、Plan完了後に自動で開始される仕組みを完全に遮断します。
    # 実行時は、GitHub Actionsの画面からこのジョブを明示的に選択して実行する必要があります。
    
    # 【最重要：修正】作成していない environment: production-approval を削除。
    # 存在しない設定に依存せず、YAMLの論理構造のみで停止を制御します。
    
    runs-on: ubuntu-latest
    
    # 【最重要：修正】if条件を workflow_dispatch（手動実行）のみに限定。
    # 自動トリガー（needsによる連鎖）がなくなったため、このジョブは人間が操作しない限り「Skipped」または「未実行」で止まります。
    if: github.event_name == 'workflow_dispatch'

    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
      TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 2-3, Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: ./my-project/02_compute

      - name: 2-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 2-5, Ensure Backend Resources Exist
        run: |
          STORAGE_ACCOUNT="sttfstate20260506yuta"
          RG_NAME="rg-storage-state"
          if ! az group show --name "$RG_NAME" &>/dev/null; then
            az group create --name "$RG_NAME" --location "japanwest"
          fi
          if ! az storage container show --name "tfstate" --account-name "$STORAGE_ACCOUNT" --auth-mode login &>/dev/null; then
            az storage container create --name "tfstate" --account-name "$STORAGE_ACCOUNT" --auth-mode login
          fi

      - name: 2-6, Terraform Init
        working-directory: ./my-project/02_compute
        run: terraform init -input=false

      - name: 2-7, Terraform Apply
        working-directory: ./my-project/02_compute
        run: terraform apply -input=false tfplan

      - name: 2-8, Wait for SSH Availability
        shell: bash
        run: |
          VM_IP=$(cd ./my-project/02_compute && terraform output -raw ansible_host_ip)
          echo "Target VM IP: $VM_IP"
          timeout 300 bash -c "until echo > /dev/tcp/$VM_IP/22; do sleep 10; done" || exit 1

      - name: 2-9, Ansible Provisioning
        working-directory: ./my-project/Ansible
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          ADMIN_PASS: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          ADMIN_USER: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VM_IP=$(cd ../02_compute && terraform output -raw ansible_host_ip)
          ansible-playbook -i inventory.ini site.yml \
            --extra-vars "target_ip=$VM_IP admin_username=$ADMIN_USER ansible_password=$ADMIN_PASS ansible_become_password=$ADMIN_PASS" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD"