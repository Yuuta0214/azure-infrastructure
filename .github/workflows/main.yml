name: 'Azure Infrastructure Build'

# 手動実行のみを受け付ける設定
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ステップ1：テスト（見積もり・シミュレーション）
  terraform-plan:
    name: '1. Terraform Plan (Test)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        run: terraform plan

  # ステップ2：本番反映（検証ブランチではスキップするように設定）
  terraform-apply:
    name: '2. Terraform Apply (Deploy)'
    needs: terraform-plan
    # 【安全装置】このif文により、featureブランチではこのジョブを実行させません
    if: github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./my-project/terraform
        run: terraform apply -auto-approve