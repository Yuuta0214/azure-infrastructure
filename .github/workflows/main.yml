##########################################################################
# Azure Infrastructure Build Workflow
# 
# 【厳守事項】
# 1. 実行範囲: 00_backend (リソースグループ、ストレージ、コンテナ) のみ
# 2. 運用フロー: 
#    - Step 1: 「Plan & Check」を手動(workflow_dispatch)で実行
#    - Step 2: 内容確認後、GitHub上で承認を行うことで「Apply & Deploy」を手動実行
# 3. 設計: Azure IaC ベストプラクティス（Plan結果のアーティファクト管理）に準拠
##########################################################################
name: 'Azure Infrastructure Build'

on:
  # 条件1: 「Plan＆Check」を手動で実行するためのトリガー
  workflow_dispatch:
    inputs:
      target_env:
        description: 'デプロイ対象の環境 (dev/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Plan & Check (00_backend)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check (00_backend)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.event.inputs.target_env }}

    steps:
      - name: '1-1. Checkout Code'
        uses: actions/checkout@v4

      - name: '1-2. Azure Login'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: '1-3. Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 条件5: 00_backend のディレクトリのみを対象とする
      - name: '1-4. Terraform Init'
        working-directory: ./my-project/00_backend
        run: terraform init

      # ベストプラクティス: 実行計画をファイルに出力し、Apply時に内容が乖離するのを防ぐ
      - name: '1-5. Terraform Plan'
        working-directory: ./my-project/00_backend
        run: |
          terraform plan \
            -var-file="../env-${{ env.TARGET_ENV }}.tfvars" \
            -out=tfplan

      # 出力したPlanファイルを後続ジョブに引き継ぐために保存
      - name: '1-6. Upload Plan Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.TARGET_ENV }}
          path: ./my-project/00_backend/tfplan
          retention-days: 1

  # =============================================================
  # 2. Apply & Deploy (00_backend)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy (00_backend)'
    needs: terraform-plan
    runs-on: ubuntu-latest
    # 条件2: 「手動」での実行（GitHub Environment の保護ルールを使用して承認ゲートを設ける）
    environment: ${{ github.event.inputs.target_env }}
    
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.event.inputs.target_env }}

    steps:
      - name: '2-1. Checkout Code'
        uses: actions/checkout@v4

      - name: '2-2. Azure Login'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: '2-3. Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # Apply前にも必ず初期化が必要
      - name: '2-4. Terraform Init'
        working-directory: ./my-project/00_backend
        run: terraform init

      # 保存しておいたPlanファイルをダウンロード
      - name: '2-5. Download Plan Artifact'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.TARGET_ENV }}
          path: ./my-project/00_backend

      # 条件4: ここで実際にRG、ストレージ、コンテナが作成される
      # ベストプラクティス: 保存されたtfplanファイルを指定することで、再計算なしでそのまま適用
      - name: '2-6. Terraform Apply'
        working-directory: ./my-project/00_backend
        run: terraform apply -auto-approve tfplan