##########################################################################
# Azure Infrastructure Build Workflow (お手本準拠・安全設計版)
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Plan & Check (00_backend)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check (00_backend)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # お手本 に倣い、Terraform実行前にCLIでリソースグループの存在を確認
      - name: 1-4, Pre-Check Resource Group
        run: |
          RG_NAME="rg-web-${{ env.TARGET_ENV }}-mgmt"
          if ! az group show --name "$RG_NAME" &>/dev/null; then
            echo "Resource Group $RG_NAME not found. Terraform will attempt to create it."
          fi

      - name: 1-5, Terraform Init
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 1-6, Terraform Plan
        working-directory: ./my-project/00_backend
        run: |
          terraform plan \
            -var-file="./env-${{ env.TARGET_ENV }}.tfvars" \
            -out=tfplan

      - name: 1-7, Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-artifacts
          path: ./my-project/00_backend/tfplan
          retention-days: 1

  # =============================================================
  # 2. Apply & Deploy (00_backend)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy (00_backend)'
    needs: terraform-plan
    # お手本 の環境設定を遵守（GitHub上の承認ゲート）
    environment: 'production'
    runs-on: ubuntu-latest
    
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 2-3, Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-artifacts
          path: ./my-project/00_backend

      - name: 2-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 2-5, Terraform Init
        working-directory: ./my-project/00_backend
        run: terraform init

      # お手本 にあった、デプロイ前の最終チェックロジック
      - name: 2-6, Pre-Deploy Safety Check
        run: |
          if [ ! -f "./my-project/00_backend/tfplan" ]; then
            echo "Error: tfplan not found."
            exit 1
          fi

      - name: 2-7, Terraform Apply
        working-directory: ./my-project/00_backend
        run: terraform apply -auto-approve tfplan