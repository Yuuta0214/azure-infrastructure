name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-plan:
    name: '1. Terraform Plan (Test)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        # ここに env セクションを追加して、Secrets を Terraform に渡します
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: terraform plan

  terraform-apply:
    name: '2. Terraform Apply (Deploy)'
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./my-project/terraform
        # Apply 側にも同様に env セクションを追加します
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: terraform apply -auto-approve