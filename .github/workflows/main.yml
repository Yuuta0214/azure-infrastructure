name: 'Azure Infrastructure Build'

# 自動実行を完全に封印し、GitHub上の「Run workflow」ボタンを押した時だけ動くように設定
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ステップ1：テスト（見積もり）
  terraform-plan:
    name: '1. Terraform Plan (Test)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        run: terraform plan

  # ステップ2：本番反映（Planが成功した後に実行）
  terraform-apply:
    name: '2. Terraform Apply (Deploy)'
    needs: terraform-plan # Plan（テスト）が正常に終わった場合のみ次に進む
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./my-project/terraform
        run: terraform apply -auto-approve