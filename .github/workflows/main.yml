name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: # 手動実行

permissions:
  contents: read

jobs:
  # --- 1. 検証ジョブ ---
  terraform-plan:
    name: '1. 検証と計画 (Validation & Plan)'
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: バックエンド用ストレージの存在確認と作成
        run: |
          # アカウント一覧から名前が一致するものを取得（サブスクリプションを明示して検索範囲を固定）
          STORAGE_EXISTS=$(az storage account list --subscription "0f273017-b259-421d-894c-ae7906f901c8" --query "[?name=='sttfstate20260506yuta'].name" -o tsv)

          if [ -z "$STORAGE_EXISTS" ]; then
            echo "ストレージアカウントが見つかりません。新規作成を開始します..."
            az group create --name rg-storage-state --location japanwest --subscription "0f273017-b259-421d-894c-ae7906f901c8"
            az storage account create --name sttfstate20260506yuta --resource-group rg-storage-state --location japanwest --sku Standard_LRS --min-tls-version TLS1_2 --subscription "0f273017-b259-421d-894c-ae7906f901c8"
            az storage container create --name tfstate --account-name sttfstate20260506yuta --subscription "0f273017-b259-421d-894c-ae7906f901c8"
          else
            echo "ストレージアカウントは既に存在します。作成処理をスキップします。"
          fi

      - name: Terraform State のリース解除
        run: |
          az storage blob lease break \
            --blob-name terraform.tfstate \
            --container-name tfstate \
            --account-name sttfstate20260506yuta || echo "解除すべきリースはありません"

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 初期化
        working-directory: ./my-project/terraform
        run: terraform init

      - name: 既存リソースグループのインポート
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET_RG="rg-web-project"; TARGET_VARS="env-prod.tfvars"; TARGET_LOC="japaneast"
          else
            TARGET_RG="rg-web-test"; TARGET_VARS="env-test.tfvars"; TARGET_LOC="japanwest"
          fi
          az group create --name $TARGET_RG --location $TARGET_LOC
          terraform import -lock=false -var-file=$TARGET_VARS \
          azurerm_resource_group.rg /subscriptions/0f273017-b259-421d-894c-ae7906f901c8/resourceGroups/$TARGET_RG || echo "既に管理下です"

      - name: Terraform 構文チェック
        working-directory: ./my-project/terraform
        run: terraform validate

      - name: Ansible 構文チェック
        working-directory: ./my-project/Ansible
        run: |
          # 構文チェック時もプロジェクト内の古い ansible.cfg を読み込ませないためにリネーム
          if [ -f ansible.cfg ]; then mv ansible.cfg ansible.cfg.tmp; fi
          ansible-playbook -i inventory.ini site.yml --syntax-check
          if [ -f ansible.cfg.tmp ]; then mv ansible.cfg.tmp ansible.cfg; fi

      - name: Terraform 実行計画の作成
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform plan -lock=false -var-file=$VAR_FILE

  # --- 2. デプロイジョブ ---
  terraform-apply:
    name: '2. 適用と Ansible デプロイ (Apply & Ansible Deploy)'
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/azure-setup'
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'test' }}
    
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 初期化
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform リソース適用
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform apply -var-file=$VAR_FILE -auto-approve

      - name: SSH ポート開放待ち
        run: sleep 20

      - name: Ansible プレイブックの実行
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_PASSWORD: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          # 実行ディレクトリに設定ファイルがある場合は一時的に退避
          if [ -f ansible.cfg ]; then mv ansible.cfg ansible.cfg.tmp; fi
          
          VM_IP=$(cd ../terraform && terraform output -raw alb_public_ip)
          
          # 【ベストプラクティス修正】OS側のあらゆるaptロックと自動更新プロセスを強制排除し、確実に初期状態を整える
          ansible all -i "$VM_IP," -u "$TF_VAR_admin_username" --extra-vars "ansible_password=$ANSIBLE_PASSWORD" -m shell -a "
            sudo systemctl stop apt-daily.service apt-daily.timer apt-daily-upgrade.service apt-daily-upgrade.timer 2>/dev/null || true;
            sudo killall apt apt-get 2>/dev/null || true;
            sudo rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock /var/lib/dpkg/lock* || true;
            sudo dpkg --configure -a || true;
            sudo apt-get update
          " --become

          # 引数を明示的に渡し、環境に依存しない実行を担保
          ansible-playbook -i inventory.ini site.yml \
            -e "target_ip=$VM_IP" \
            -e "admin_username=$TF_VAR_admin_username" \
            -e "ansible_password=$ANSIBLE_PASSWORD"
          
          # 実行後に設定ファイルを戻す
          if [ -f ansible.cfg.tmp ]; then mv ansible.cfg.tmp ansible.cfg; fi