name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: # 手動実行（画像 Job #40 の形式に準拠）

permissions:
  contents: read

jobs:
  # ==========================================
  # 1. 検証と計画 (Validation & Plan)
  # ==========================================
  terraform-plan:
    name: '1. 検証と計画 (Validation & Plan)'
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: バックエンド用ストレージの存在確認と作成
        # ストレージアカウント作成時の競合やDeleting状態を考慮した待機ロジック
        run: |
          echo "Checking 'rg-storage-state' status..."
          for i in {1..20}; do
            STATUS=$(az group show --name rg-storage-state --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NotFound")
            if [ "$STATUS" = "Deleting" ]; then
              echo "Resource group is deleting... waiting 30s ($i/20)"
              sleep 30
            else
              break
            fi
          done

          STORAGE_EXISTS=$(az storage account list --query "[?name=='sttfstate20260506yuta'].name" -o tsv)
          if [ -z "$STORAGE_EXISTS" ]; then
            az group create --name rg-storage-state --location japanwest
            az storage account create --name sttfstate20260506yuta --resource-group rg-storage-state --location japanwest --sku Standard_LRS --min-tls-version TLS1_2
            az storage container create --name tfstate --account-name sttfstate20260506yuta
          fi

      - name: Terraform State のリース解除
        # 前回の実行失敗でロックが残っている場合に備えた処置
        run: |
          az storage blob lease break --blob-name terraform.tfstate --container-name tfstate --account-name sttfstate20260506yuta || echo "No lease to break"

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 初期化
        working-directory: ./my-project/terraform
        run: terraform init

      - name: 既存リソースグループのインポート
        # インフラの冪等性を守るため、既存のRGがある場合は確実に取り込む
        working-directory: ./my-project/terraform
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET_RG="rg-web-project"; TARGET_VARS="env-prod.tfvars"; TARGET_LOC="japaneast"
          else
            TARGET_RG="rg-web-test"; TARGET_VARS="env-test.tfvars"; TARGET_LOC="japanwest"
          fi
          az group create --name $TARGET_RG --location $TARGET_LOC || true
          terraform import -lock=false -var-file=$TARGET_VARS azurerm_resource_group.rg /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/$TARGET_RG || echo "Already imported"

      - name: Terraform 構文チェック
        working-directory: ./my-project/terraform
        run: terraform validate

      - name: Ansible 構文チェック
        # 画像のステップに合わせて追加。早期失敗を実現
        working-directory: ./my-project/Ansible
        run: ansible-playbook site.yml --syntax-check

      - name: Terraform 実行計画の作成
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform plan -lock=false -var-file=$VAR_FILE

  # ==========================================
  # 2. 適用と Ansible デプロイ (Apply & Ansible Deploy)
  # ==========================================
  terraform-apply:
    name: '2. 適用と Ansible デプロイ (Apply & Ansible Deploy)'
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/azure-setup'
    runs-on: ubuntu-latest
    environment: ${{ (github.ref == 'refs/heads/main') && 'production' || 'development' }}
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Azure ログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 初期化
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform リソース適用
        # 条件1：ここでVM（箱）を確実に作成
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform apply -var-file=$VAR_FILE -auto-approve

      - name: Ansible 用 SSH キー配置
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Ansible プレイブックの実行
        # 条件1・2：VMの準備完了を待つ site.yml を実行（箱と中身の分離）
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          # site.yml の各サービスに渡される機密情報
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          # 最新のIPを取得
          VM_IP=$(cd ../terraform && terraform output -raw alb_public_ip)
          ADMIN_USER=$(cd ../terraform && terraform output -raw environment) # variables から取得
          
          ansible-playbook -i inventory.ini site.yml \
            -e "target_ip=$VM_IP" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD" \
            -e "mysql_user=webuser" \
            -e "mysql_db_name=webapp_db"