##########################################################################
# Azure Infrastructure Build Workflow
# 運用フロー: featureで検証完了後、mainにマージして本番反映
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'デプロイ対象の環境 (dev/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Plan & Check (検証・本番共通)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check (00_backend)'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: '1-1. Checkout Code'
        uses: actions/checkout@v4

      - name: '1-2. Azure Login'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: '1-3. Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: '1-4. Terraform Init'
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: '1-5. Terraform Plan'
        id: plan
        working-directory: ./my-project/00_backend
        run: |
          terraform plan \
            -var-file="env-${{ github.event.inputs.target_env }}.tfvars" \
            -out=tfplan
        
      - name: '1-6. Upload Plan Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.target_env }}
          path: ./my-project/00_backend/tfplan
          retention-days: 1

  # =============================================================
  # 2. Apply & Deploy (手動承認ゲート)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy (00_backend)'
    needs: terraform-plan
    runs-on: ubuntu-latest
    # 【安全設計】Environmentによる承認待ちを強制
    environment: ${{ github.event.inputs.target_env }}
    
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: '2-1. Checkout Code'
        uses: actions/checkout@v4

      - name: '2-2. Azure Login'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: '2-3. Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: '2-4. Terraform Init'
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: '2-5. Download Plan Artifact'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.target_env }}
          path: ./my-project/00_backend

      - name: '2-6. Terraform Apply'
        # どのブランチでも承認さえあれば実行を許可（検証用・本番用の区別をEnvironmentで行う）
        if: success()
        working-directory: ./my-project/00_backend
        run: terraform apply -auto-approve tfplan