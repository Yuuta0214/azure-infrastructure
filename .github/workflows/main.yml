##########################################################################
# Azure Infrastructure Build Workflow
# 
# 厳守ルール：
# 1. 表示ジョブは2つ（Plan/Apply）に集約し、各ジョブ内で 00 -> 01 を実行
# 2. 実行内容が誰でも理解できるよう、全ステップに詳細な日本語コメントを付与
# 3. 00（Backend）が完了しないと01のStateが保存できない物理的制約を考慮
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Plan & Check ジョブ
  # =============================================================
  plan-and-check:
    name: 'Plan & Check (Backend -> Network)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 1-1. リポジトリのソースコードを取得
        uses: actions/checkout@v4

      - name: 1-2. Azure CLI ログイン (OIDC認証)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 1-3. Terraform 環境のセットアップ
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # --- 00_backend ---
      - name: 1-4. [00_backend] 初期化
        working-directory: ./my-project/00_backend
        run: terraform init -backend=false -input=false

      - name: 1-5. [00_backend] 実行計画の作成
        working-directory: ./my-project/00_backend
        run: terraform plan -var-file="env-${{ env.TARGET_ENV }}.tfvars" -out=tfplan-00

      # --- 01_network ---
      - name: 1-6. [01_network] 初期化
        # バックエンドブロックが存在する場合でも強制的に無視して構成チェックのみ行う
        working-directory: ./my-project/01_network
        run: terraform init -backend=false -input=false

      - name: 1-7. [01_network] 実行計画の作成
        working-directory: ./my-project/01_network
        run: terraform plan -var-file="env-${{ env.TARGET_ENV }}.tfvars" -out=tfplan-01

      - name: 1-8. プラン結果をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plans
          path: |
            my-project/00_backend/tfplan-00
            my-project/01_network/tfplan-01

  # =============================================================
  # 2. Apply & Deploy ジョブ
  # =============================================================
  apply-and-deploy:
    name: 'Apply & Deploy (Backend -> Network)'
    needs: plan-and-check
    environment: 'production'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 2-1. コードのチェックアウト
        uses: actions/checkout@v4

      - name: 2-2. Azure 認証の再実行
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 2-3. プランファイルのダウンロード
        uses: actions/download-artifact@v4
        with:
          name: terraform-plans
          path: ./plan-results

      - name: 2-4. Terraform 環境のセットアップ
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # --- 00_backend ---
      - name: 2-5. [00_backend] 適用を実行
        working-directory: ./my-project/00_backend
        run: |
          terraform init -backend=false -input=false
          terraform apply -auto-approve ../../plan-results/my-project/00_backend/tfplan-00

      # --- 01_network ---
      - name: 2-6. [01_network] 適用を実行
        # 00で作成されたストレージをここで初めてBackendとして接続
        working-directory: ./my-project/01_network
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-web-${{ env.TARGET_ENV }}-mgmt" \
            -backend-config="storage_account_name=stweb${{ env.TARGET_ENV }}backend" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=network.tfstate" \
            -input=false
          terraform apply -auto-approve ../../plan-results/my-project/01_network/tfplan-01