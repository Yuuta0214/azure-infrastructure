##########################################################################
# Azure Infrastructure Build Workflow (一括Apply・承認1回版)
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Plan (00と01の両方を一度に計画)
  # =============================================================
  terraform-plan:
    name: '1. Plan (All Layers)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 00_backendのPlan
      - name: 1-4, Plan Backend
        working-directory: ./my-project/00_backend
        run: |
          terraform init -backend=false
          terraform plan -var-file="env-${{ env.TARGET_ENV }}.tfvars" -out=tfplan-backend

      # 01_networkのPlan (00がある前提でinit)
      - name: 1-5, Plan Network
        working-directory: ./my-project/01_network
        run: |
          terraform init
          terraform plan -var-file="env-${{ env.TARGET_ENV }}.tfvars" -out=tfplan-network

      - name: 1-6, Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplans
          path: |
            ./my-project/00_backend/tfplan-backend
            ./my-project/01_network/tfplan-network

  # =============================================================
  # 2. Apply (ここで1回だけ production 承認が入る)
  # =============================================================
  terraform-apply:
    name: '2. Apply (All Layers)'
    needs: terraform-plan
    environment: 'production' # 承認ゲートはここ1箇所だけ
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 2-3, Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplans
          path: ./my-project

      - name: 2-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --- 00_backend を先に実行 ---
      - name: 2-5, Apply Backend
        working-directory: ./my-project/00_backend
        run: |
          terraform init -backend=false
          terraform apply -auto-approve ../tfplan-backend

      # --- 続けて 01_network を実行 ---
      - name: 2-6, Apply Network
        working-directory: ./my-project/01_network
        run: |
          terraform init
          terraform apply -auto-approve ../tfplan-network