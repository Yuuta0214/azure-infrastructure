name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 1. 検証ジョブ：常に検証用（test）の設定を使用し、本番には絶対に触れない
  terraform-plan:
    name: '1. Validation & Test Plan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./my-project/terraform
        run: terraform validate

      - name: Ansible Syntax Check
        working-directory: ./my-project/Ansible
        run: ansible-playbook -i inventory.ini site.yml --syntax-check

      - name: Terraform Plan (Test Env)
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        # 検証用の設定ファイルを明示して実行
        run: terraform plan -var-file=env-test.tfvars

  # 2. 本番デプロイジョブ：mainブランチのみ実行可能・本番用（prod）の設定を使用
  terraform-apply:
    name: '2. Production Apply & Deploy'
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Apply (Prod Env)
        id: apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        # 本番用の設定ファイルを明示して実行
        run: terraform apply -var-file=env-prod.tfvars -auto-approve

      - name: Sleep for 60 seconds
        run: sleep 60

      - name: Run Ansible Playbook
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_PASSWORD: ${{ secrets.TF_VAR_admin_password }}
          # Terraform 変数を参照するためにパスワード等も渡しておく
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          # 【修正】output取得時にも確実に本番用の.tfvarsを指定する
          VM_IP=$(cd ../terraform && terraform output -raw -var-file=env-prod.tfvars alb_public_ip)
          ansible-playbook -i inventory.ini site.yml \
            -e "ansible_host=$VM_IP" \
            -e "ansible_password=$ANSIBLE_PASSWORD"