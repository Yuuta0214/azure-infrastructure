##########################################################################
# Azure Infrastructure Build Workflow (Plan先行・一括承認版)
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Job 1 (00_Plan)
  # =============================================================
  terraform-plan-00:
    name: '1. Plan (00_backend)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Plan 00
        working-directory: ./my-project/00_backend
        run: |
          terraform init -backend=false
          terraform plan -out=tfplan-00

      - name: Upload Plan 00
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-00
          path: ./my-project/00_backend/tfplan-00

  # =============================================================
  # 3. Job 3 (01_Plan) ※Job 1の完了待ち、Applyは待たない
  # =============================================================
  terraform-plan-01:
    name: '3. Plan (01_network)'
    needs: terraform-plan-00
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Plan 01
        working-directory: ./my-project/01_network
        run: |
          # 00が未完了でも実行できるようbackendは無視する
          terraform init -backend=false
          terraform plan -out=tfplan-01

      - name: Upload Plan 01
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-01
          path: ./my-project/01_network/tfplan-01

  # =============================================================
  # 2. Job 2 (00_Apply) ※承認待ち、01のPlan完了も一応待つ
  # =============================================================
  terraform-apply-00:
    name: '2. Apply (00_backend)'
    needs: [terraform-plan-00, terraform-plan-01]
    environment: 'production' # ここで承認
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-00
          path: ./my-project/00_backend
      - name: Apply 00
        working-directory: ./my-project/00_backend
        run: |
          terraform init -backend=false
          terraform apply -auto-approve tfplan-00

  # =============================================================
  # 4. Job 4 (01_Apply) ※Job 2の完了待ち
  # =============================================================
  terraform-apply-01:
    name: '4. Apply (01_network)'
    needs: terraform-apply-00
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-01
          path: ./my-project/01_network
      - name: Apply 01
        working-directory: ./my-project/01_network
        run: |
          # ここでは00が終わっているのでbackendを正式に初期化できる
          terraform init
          terraform apply -auto-approve tfplan-01