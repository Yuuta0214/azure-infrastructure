name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: # 手動実行

permissions:
  contents: read

jobs:
  # --- 1. 検証ジョブ：実行ブランチに応じた Plan を表示して一旦停止 ---
  terraform-plan:
    name: '1. Validation & Plan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 【重要】管理用ストレージの自動作成（存在する場合は継続）
      - name: Create Backend Storage (One-time)
        run: |
          az group create --name tfstate-rg --location japaneast
          az storage account create --name sttfstate20260506yuta --resource-group tfstate-rg --location japaneast --sku Standard_LRS || echo "Storage account already exists."
          az storage container create --name tfstate --account-name sttfstate20260506yuta || echo "Container already exists."

      # 【412エラー対策】残っているリースのロックを強制的に解除
      - name: Force Break State Lease
        run: |
          az storage blob lease break \
            --blob-name terraform.tfstate \
            --container-name tfstate \
            --account-name sttfstate20260506yuta || echo "No active lease to break, proceeding..."

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      # 【ロック回避追加】既存リソースの自動インポート
      - name: Terraform Import Existing Resources
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET_RG="rg-web-project"
            TARGET_VARS="env-prod.tfvars"
          else
            TARGET_RG="rg-web-test"
            TARGET_VARS="env-test.tfvars"
          fi
          
          # -lock=false を追加して、デッドロックによる停止を回避
          terraform import -lock=false -var-file=$TARGET_VARS \
          azurerm_resource_group.rg /subscriptions/0f273017-b259-421d-894c-ae7906f901c8/resourceGroups/$TARGET_RG || echo "Already imported or failed, proceeding..."

      - name: Terraform Validate
        working-directory: ./my-project/terraform
        run: terraform validate

      - name: Ansible Syntax Check
        working-directory: ./my-project/Ansible
        run: ansible-playbook -i inventory.ini site.yml --syntax-check

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Target Environment: Production"
            terraform plan -lock=false -var-file=env-prod.tfvars
          else
            echo "Target Environment: Test"
            terraform plan -lock=false -var-file=env-test.tfvars
          fi

  # --- 2. デプロイジョブ ---
  terraform-apply:
    name: '2. Apply & Ansible Deploy'
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/azure-setup'
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'test' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            terraform apply -var-file=env-prod.tfvars -auto-approve
          else
            terraform apply -var-file=env-test.tfvars -auto-approve
          fi

      - name: Sleep for 60 seconds (Wait for VM Boot)
        run: sleep 60

      - name: Run Ansible Playbook (Full Validation)
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_PASSWORD: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET_VARS="env-prod.tfvars"
          else
            TARGET_VARS="env-test.tfvars"
          fi
          VM_IP=$(cd ../terraform && terraform output -raw -var-file=$TARGET_VARS alb_public_ip)
          ansible-playbook -i inventory.ini site.yml \
            -e "target_ip=$VM_IP" \
            -e "admin_username=$TF_VAR_admin_username" \
            -e "ansible_password=$ANSIBLE_PASSWORD"