##########################################################################
# Azure Infrastructure Build Workflow (Refactored Version)
# 構成: 00_backend / 01_network / 02_compute の分離環境に対応
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: # 手動実行トリガー

permissions:
  contents: read
  id-token: write # OIDC認証に必須

jobs:
  # =============================================================
  # 1. Terraform Plan & Check (検証フェーズ)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
      TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 【修正】working-directory を 02_compute に変更
      - name: 1-4, Terraform Init
        working-directory: ./my-project/02_compute
        run: terraform init -input=false

      - name: 1-5, Terraform Plan
        id: plan
        working-directory: ./my-project/02_compute
        run: |
          # ブランチに応じて変数ファイルを切り替え
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-dev.tfvars")
          
          # Apply用のバイナリ(tfplan)と確認用のテキスト(details)を出力
          terraform plan -var-file="$VAR_FILE" -input=false -out=tfplan
          terraform show -no-color tfplan > plan_details.txt
          cat plan_details.txt

      # 【重要】後続のApplyジョブにPlanファイルを渡すために保存
      - name: 1-6, Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: |
            ./my-project/02_compute/tfplan
            ./my-project/02_compute/plan_details.txt
          retention-days: 1

  # =============================================================
  # 2. Terraform Apply & Ansible Deploy (実行フェーズ)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy'
    needs: terraform-plan
    environment: production-approval # GitHub上で承認ボタンを押すまで待機
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
      TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 【修正】Planジョブで作成した成果物を取得
      - name: 2-3, Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: ./my-project/02_compute

      - name: 2-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 2-5, Terraform Init
        working-directory: ./my-project/02_compute
        run: terraform init -input=false

      # 【修正】再計算(plan)せず、保存された tfplan をそのまま適用（安全・確実）
      - name: 2-6, Terraform Apply
        working-directory: ./my-project/02_compute
        run: terraform apply -input=false tfplan

      # 【修正】VM起動直後のSSH未反応による失敗を防ぐ待機処理
      - name: 2-7, Wait for SSH Availability
        shell: bash
        run: |
          VM_IP=$(cd ./my-project/02_compute && terraform output -raw ansible_host_ip)
          echo "Target VM IP: $VM_IP"
          echo "Waiting for SSH port 22 to open..."
          timeout 300 bash -c "until echo > /dev/tcp/$VM_IP/22; do sleep 10; done" || (echo "SSH Timeout" && exit 1)

      # 【修正】Ansibleの実行環境を構築してプロビジョニング開始
      - name: 2-8, Ansible Provisioning
        working-directory: ./my-project/Ansible
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          ADMIN_PASS: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          ADMIN_USER: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          # 02_compute層から最新のデプロイ先IPを取得
          VM_IP=$(cd ../02_compute && terraform output -raw ansible_host_ip)
          
          # inventory.iniの変数定義に合わせて必要な情報を全て注入
          ansible-playbook -i inventory.ini site.yml \
            --extra-vars "target_ip=$VM_IP admin_username=$ADMIN_USER ansible_password=$ADMIN_PASS ansible_become_password=$ADMIN_PASS" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD"