name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # ==========================================
  # 1. 計画フェーズ (Plan)
  # ==========================================
  terraform-plan:
    name: '1. Plan'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      BACKEND_RG: "rg-storage-state"
      BACKEND_STORAGE: "sttfstate20260506yuta"
      BACKEND_CONTAINER: "tfstate"
      LOCATION: "japanwest"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Backend Infrastructure
        run: |
          # リソースグループの作成（完了を待機）
          az group create --name "$BACKEND_RG" --location "$LOCATION"
          
          # ストレージアカウントの作成（完了を待機）
          az storage account create \
            --name "$BACKEND_STORAGE" \
            --resource-group "$BACKEND_RG" \
            --location "$LOCATION" \
            --sku Standard_LRS \
            --allow-blob-public-access false
          
          # コンテナの作成
          az storage container create \
            --name "$BACKEND_CONTAINER" \
            --account-name "$BACKEND_STORAGE" \
            --auth-mode login

      - name: Break State Lease
        run: |
          az storage blob lease break \
            --blob-name terraform.tfstate \
            --container-name "$BACKEND_CONTAINER" \
            --account-name "$BACKEND_STORAGE" || echo "No active lease."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: Import Baseline Resources
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          # 環境判定
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"; VAR_FILE="env-prod.tfvars"; LOC="japaneast"
          else
            ENV="test"; VAR_FILE="env-test.tfvars"; LOC="japanwest"
          fi
          TARGET_RG="rg-web-$ENV"

          # ターゲットとなるRGを確実に作成してからインポート
          az group create --name "$TARGET_RG" --location "$LOC"
          
          terraform import -input=false -var-file="$VAR_FILE" \
            azurerm_resource_group.rg /subscriptions/$(az account show --query id -o tsv)/resourceGroups/"$TARGET_RG" || echo "Resource already managed by Terraform."

      - name: Validate & Plan
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform validate
          terraform plan -var-file="$VAR_FILE" -input=false -out=tfplan

  # ==========================================
  # 2. 適用フェーズ (Apply)
  # ==========================================
  terraform-apply:
    name: '2. Apply'
    needs: terraform-plan
    environment: production-approval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          # テスト環境への適用を基本とし、安全性を確保
          terraform apply -var-file=env-test.tfvars -auto-approve -input=false

      - name: Ansible Provisioning
        working-directory: ./my-project/Ansible
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          ADMIN_PASS: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          ADMIN_USER: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VM_IP=$(cd ../terraform && terraform output -raw ansible_host_ip)
          ansible-playbook -i inventory.ini site.yml \
            --extra-vars "ansible_host=$VM_IP ansible_user=$ADMIN_USER ansible_password=$ADMIN_PASS" \
            -e "admin_username=$ADMIN_USER" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD"