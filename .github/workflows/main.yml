##########################################################################
# Azure Infrastructure Build Workflow
# 
# 1. 実行範囲: 00_backend のみに限定
# 2. 実行条件: 手動起動 (workflow_dispatch)
# 3. 環境判別: ブランチ名から自動判別 (main=prod, others=dev)
# 4. 承認ゲート: Environment 設定による手動承認
# 5. パス修正: 00_backend直下のtfvarsを参照
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Plan & Check (00_backend)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check (00_backend)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # ブランチ名から自動でターゲット環境を決定
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 1-4, Terraform Init
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 1-5, Terraform Plan
        working-directory: ./my-project/00_backend
        run: |
          terraform plan \
            -var-file="./env-${{ env.TARGET_ENV }}.tfvars" \
            -out=tfplan

      - name: 1-6, Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-artifacts
          path: ./my-project/00_backend/tfplan
          retention-days: 1

  # =============================================================
  # 2. Apply & Deploy (00_backend)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy (00_backend)'
    needs: terraform-plan
    # GitHub Environment を使用した承認ゲート
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    runs-on: ubuntu-latest
    
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 2-3, Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-artifacts
          path: ./my-project/00_backend

      - name: 2-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 2-5, Terraform Init
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 2-6, Terraform Apply
        working-directory: ./my-project/00_backend
        run: terraform apply -auto-approve tfplan