name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # ==========================================
  # 1. 計画フェーズ (Plan)
  # ==========================================
  terraform-plan:
    name: '1. Plan'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Backend Infrastructure
        run: |
          # 1つずつ完了を待機し、確実にリソースを準備する
          az group create --name "rg-storage-state" --location "japanwest"
          az storage account create \
            --name "sttfstate20260506yuta" \
            --resource-group "rg-storage-state" \
            --location "japanwest" \
            --sku Standard_LRS \
            --allow-blob-public-access false
          az storage container create \
            --name "tfstate" \
            --account-name "sttfstate20260506yuta" \
            --auth-mode login

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform plan -var-file="$VAR_FILE" -input=false -out=tfplan

  # ==========================================
  # 2. 適用フェーズ (Apply)
  # ==========================================
  terraform-apply:
    name: '2. Apply'
    needs: terraform-plan
    # GitHubのEnvironment設定による承認を強制
    environment: production-approval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: terraform apply -var-file=env-test.tfvars -auto-approve -input=false

      - name: Ansible Provisioning
        working-directory: ./my-project/Ansible
        env:
          # Ansible 2.13以降のベストプラクティスに基づき、廃止プラグインを無効化
          ANSIBLE_STDOUT_CALLBACK: default
          # 以前エラーになった community.general.yaml の代替設定
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          ADMIN_PASS: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          ADMIN_USER: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VM_IP=$(cd ../terraform && terraform output -raw ansible_host_ip)
          # エラーの原因だったプラグイン指定を排除
          ansible-playbook -i inventory.ini site.yml \
            --extra-vars "ansible_host=$VM_IP ansible_user=$ADMIN_USER ansible_password=$ADMIN_PASS" \
            -e "admin_username=$ADMIN_USER" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD"