name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: # 手動実行

permissions:
  contents: read

jobs:
  # --- 1. 検証ジョブ ---
  terraform-plan:
    name: '1. Validation & Plan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 管理用（State用）リソースグループの作成
      # ストレージ自体はどちらのリージョンの管理も可能なため、一旦 japanwest に固定しています
      - name: Create Backend Storage (One-time)
        run: |
          az group create --name rg-storage-state --location japanwest
          az storage account create --name sttfstate20260506yuta --resource-group rg-storage-state --location japanwest --sku Standard_LRS || echo "Exists"
          az storage container create --name tfstate --account-name sttfstate20260506yuta || echo "Exists"

      # 412エラー対策：リースの強制解除
      - name: Force Break State Lease
        run: |
          az storage blob lease break \
            --blob-name terraform.tfstate \
            --container-name tfstate \
            --account-name sttfstate20260506yuta || echo "No lease to break"

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      # 環境に応じたリソースグループ名とリージョンを動的にセット
      - name: Terraform Import Existing Resources
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          # ブランチに応じてターゲット（名前・変数ファイル・場所）を切り替え
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET_RG="rg-web-project"
            TARGET_VARS="env-prod.tfvars"
            TARGET_LOC="japaneast"
          else
            TARGET_RG="rg-web-test"
            TARGET_VARS="env-test.tfvars"
            TARGET_LOC="japanwest"
          fi
          
          # 決定したリージョンでリソースグループを作成（存在しなければ）
          az group create --name $TARGET_RG --location $TARGET_LOC
          
          # Terraformの管理対象としてリソースグループをインポート
          terraform import -lock=false -var-file=$TARGET_VARS \
          azurerm_resource_group.rg /subscriptions/0f273017-b259-421d-894c-ae7906f901c8/resourceGroups/$TARGET_RG || echo "Already managed"

      - name: Terraform Validate
        working-directory: ./my-project/terraform
        run: terraform validate

      - name: Ansible Syntax Check
        working-directory: ./my-project/Ansible
        run: ansible-playbook -i inventory.ini site.yml --syntax-check

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            terraform plan -lock=false -var-file=env-prod.tfvars
          else
            terraform plan -lock=false -var-file=env-test.tfvars
          fi

  # --- 2. デプロイジョブ ---
  terraform-apply:
    name: '2. Apply & Ansible Deploy'
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/azure-setup'
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'test' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            terraform apply -var-file=env-prod.tfvars -auto-approve
          else
            terraform apply -var-file=env-test.tfvars -auto-approve
          fi

      - name: Sleep for 60 seconds
        run: sleep 60

      - name: Run Ansible Playbook
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_PASSWORD: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET_VARS="env-prod.tfvars"
          else
            TARGET_VARS="env-test.tfvars"
          fi
          VM_IP=$(cd ../terraform && terraform output -raw -var-file=$TARGET_VARS alb_public_ip)
          ansible-playbook -i inventory.ini site.yml \
            -e "target_ip=$VM_IP" \
            -e "admin_username=$TF_VAR_admin_username" \
            -e "ansible_password=$ANSIBLE_PASSWORD"