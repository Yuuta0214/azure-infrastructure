##########################################################################
# Azure Infrastructure Build Workflow (お手本準拠・統合版)
##########################################################################
# 目的: 00_backend および 01_network の一連のデプロイを2つのジョブで完結
# 特徴: 統合されたPlan確認、単一承認ゲート、OIDC認証の維持
##########################################################################
name: 'Azure Infrastructure Build'

on:
  workflow_dispatch: # 手動実行

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================
  # 1. Plan & Check (00_backend + 01_network)
  # =============================================================
  terraform-plan:
    name: '1. Plan & Check (00+01)'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 1-1, Checkout Code
        uses: actions/checkout@v4

      - name: 1-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 1-3, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --- 00_backend Plan ---
      - name: 1-4, Terraform Init (00_backend)
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 1-5, Terraform Plan (00_backend)
        working-directory: ./my-project/00_backend
        run: |
          terraform plan \
            -var-file="../00_backend/env-${{ env.TARGET_ENV }}.tfvars" \
            -out=tfplan-00

      # --- 01_network Plan ---
      - name: 1-6, Terraform Init (01_network)
        working-directory: ./my-project/01_network
        run: terraform init

      - name: 1-7, Terraform Plan (01_network)
        working-directory: ./my-project/01_network
        run: |
          terraform plan \
            -var-file="../01_network/env-${{ env.TARGET_ENV }}.tfvars" \
            -out=tfplan-01

      # --- Artifact 保存 (両方のプランを1つにまとめてアップロード) ---
      - name: 1-8, Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-all-artifacts
          path: |
            ./my-project/00_backend/tfplan-00
            ./my-project/01_network/tfplan-01

  # =============================================================
  # 2. Apply & Deploy (00_backend + 01_network)
  # =============================================================
  terraform-apply:
    name: '2. Apply & Deploy (00+01)'
    needs: terraform-plan
    environment: 'production' # ここで承認
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      ARM_USE_OIDC: true

    steps:
      - name: 2-1, Checkout Code
        uses: actions/checkout@v4

      - name: 2-2, Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 2-3, Download Plan Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplan-all-artifacts
          path: ./my-project # ディレクトリ構造を維持してダウンロード

      - name: 2-4, Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --- 00_backend Apply ---
      - name: 2-5, Terraform Init (00_backend)
        working-directory: ./my-project/00_backend
        run: terraform init

      - name: 2-6, Terraform Apply (00_backend)
        working-directory: ./my-project/00_backend
        run: terraform apply -auto-approve tfplan-00

      # --- 01_network Apply ---
      - name: 2-7, Terraform Init (01_network)
        working-directory: ./my-project/01_network
        run: terraform init

      - name: 2-8, Terraform Apply (01_network)
        working-directory: ./my-project/01_network
        run: terraform apply -auto-approve tfplan-01