name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 1. 検証ジョブ（どのブランチでも実行され、実機には一切触れない）
  terraform-plan:
    name: '1. Validation & Plan (No Deploy)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      # 【重要】論理チェック（実機に触れず、構文やエスケープ、変数をチェック）
      - name: Terraform Validate
        working-directory: ./my-project/terraform
        run: terraform validate

      # 【重要】Ansible構文チェック（実機に触れず、Playbookの書き方をチェック）
      - name: Ansible Syntax Check
        working-directory: ./my-project/Ansible
        run: ansible-playbook -i inventory.ini site.yml --syntax-check

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: terraform plan

  # 2. 本番デプロイジョブ（mainブランチのみ実行可能・実機を操作する）
  terraform-apply:
    name: '2. Terraform Apply & Ansible Deploy'
    needs: terraform-plan
    # 【絶対防御】mainブランチ以外ではこのジョブは実行されません
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: terraform apply -auto-approve

      - name: Sleep for 60 seconds
        run: sleep 60

      - name: Run Ansible Playbook
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_PASSWORD: ${{ secrets.TF_VAR_admin_password }}
        run: |
          VM_IP=$(cd ../terraform && terraform output -raw alb_public_ip)
          ansible-playbook -i inventory.ini site.yml \
            -e "ansible_host=$VM_IP" \
            -e "ansible_password=$ANSIBLE_PASSWORD"