name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform-plan:
    name: '1. Plan'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Backend Infrastructure
        run: |
          az group create --name "rg-storage-state" --location "japanwest"
          az storage account create --name "sttfstate20260506yuta" --resource-group "rg-storage-state" --location "japanwest" --sku Standard_LRS --allow-blob-public-access false
          az storage container create --name "tfstate" --account-name "sttfstate20260506yuta" --auth-mode login

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VAR_FILE=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "env-prod.tfvars" || echo "env-test.tfvars")
          terraform plan -var-file="$VAR_FILE" -input=false -out=tfplan

  terraform-apply:
    name: '2. Apply & Deploy'
    needs: terraform-plan
    environment: production-approval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-project/terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: terraform apply -var-file=env-test.tfvars -auto-approve -input=false

      - name: Wait for SSH Availability
        shell: bash
        run: |
          # VMのIPを取得
          VM_IP=$(cd ./my-project/terraform && terraform output -raw ansible_host_ip)
          echo "Target VM IP: $VM_IP"
          
          # SSHポート(22)が応答を返すまで最大5分間、10秒ごとにリトライ
          # これにより「Connection timed out」を物理的に回避します
          echo "Waiting for SSH port 22 to open on $VM_IP..."
          timeout 300 bash -c "until echo > /dev/tcp/$VM_IP/22; do sleep 10; done" || (echo "SSH port did not open in time" && exit 1)
          echo "SSH port is open. Proceeding to Ansible."

      - name: Ansible Provisioning
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: default
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          ADMIN_PASS: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
          ADMIN_USER: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
        run: |
          VM_IP=$(cd ../terraform && terraform output -raw ansible_host_ip)
          ansible-playbook -i inventory.ini site.yml \
            --extra-vars "ansible_host=$VM_IP ansible_user=$ADMIN_USER ansible_password=$ADMIN_PASS ansible_become_password=$ADMIN_PASS" \
            -e "admin_username=$ADMIN_USER" \
            -e "mysql_root_password=$MYSQL_ROOT_PASSWORD" \
            -e "mysql_password=$MYSQL_PASSWORD"