name: 'Azure Infrastructure Build'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-setup:
    name: 'Setup Environment'
    runs-on: ubuntu-latest
    outputs:
      state_file: ${{ steps.vars.outputs.state_file }}
      var_file: ${{ steps.vars.outputs.var_file }}
      environment: ${{ steps.vars.outputs.environment }}
    steps:
      - id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "state_file=prod.tfstate" >> $GITHUB_OUTPUT
            echo "var_file=env-prod.tfvars" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "state_file=test.tfstate" >> $GITHUB_OUTPUT
            echo "var_file=env-test.tfvars" >> $GITHUB_OUTPUT
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

  terraform-apply:
    name: 'Apply & Ansible Deploy'
    needs: terraform-setup
    environment: ${{ needs.terraform-setup.outputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: ./my-project/terraform
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
        run: |
          terraform init -backend-config="key=${{ needs.terraform-setup.outputs.state_file }}"
          terraform apply -var-file=${{ needs.terraform-setup.outputs.var_file }} -auto-approve

      - name: Ansible Deploy
        working-directory: ./my-project/Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          VM_IP=$(cd ../terraform && terraform output -raw alb_public_ip)
          
          # インベントリファイルを使わず、実行時に直接IPを指定する（これが最も失敗しない方法です）
          ansible-playbook -i "${VM_IP}," \
            -u ${{ secrets.TF_VAR_admin_username }} \
            -e "ansible_password=${{ secrets.TF_VAR_admin_password }}" \
            -e "ansible_python_interpreter=/usr/bin/python3" \
            site.yml